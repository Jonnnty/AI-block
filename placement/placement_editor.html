    function parsePlyHeader(arrayBuffer) {
      const bytes = new Uint8Array(arrayBuffer);
      let headerEnd = 0;
      const dec = new TextDecoder('ascii');
      for (let i = 0; i < bytes.length - 12; i++) {
        if (dec.decode(bytes.subarray(i, i + 11)) === 'end_header\n') { headerEnd = i + 11; break; }
      }
      const header = dec.decode(bytes.subarray(0, headerEnd));
      let vertexCount = 0, propCount = 0;
      for (const line of header.split('\n')) {
        if (line.startsWith('element vertex')) vertexCount = parseInt(line.split(/\s+/)[2], 10);
        if (line.startsWith('property float')) propCount++;
      }
      return { headerEnd, vertexCount, propCount };
    }

    function decimatePlyArrayBuffer(arrayBuffer, ratio) {
      if (ratio >= 1) return arrayBuffer;
      const meta = parsePlyHeader(arrayBuffer);
      const { headerEnd, vertexCount, propCount } = meta;
      if (!vertexCount || !propCount) return arrayBuffer;
      const keepStep = Math.max(1, Math.round(1 / ratio));
      const newCount = Math.ceil(vertexCount / keepStep);
      if (newCount >= vertexCount) return arrayBuffer;
      const stride = propCount * 4;
      const headerStr = new TextDecoder('ascii').decode(new Uint8Array(arrayBuffer, 0, headerEnd));
      const newHeader = new TextEncoder().encode(headerStr.replace(/element vertex \d+/, `element vertex ${newCount}`));
      const out = new ArrayBuffer(newHeader.length + newCount * stride);
      new Uint8Array(out).set(newHeader, 0);
      const srcU8 = new Uint8Array(arrayBuffer, headerEnd);
      const dstU8 = new Uint8Array(out, newHeader.length);
      let outIdx = 0;
      for (let i = 0; i < vertexCount && outIdx < newCount; i += keepStep) {
        dstU8.set(srcU8.subarray(i * stride, i * stride + stride), outIdx * stride);
        outIdx++;
      }
      return out;
    }

    function computePlyBounds(arrayBuffer) {
      const meta = parsePlyHeader(arrayBuffer);
      const { headerEnd, vertexCount, propCount } = meta;
      const fallback = {
        center: { x: 0, y: 0, z: 0 },
        min: { x: 0, y: 0, z: 0 },
        max: { x: 0, y: 0, z: 0 },
        halfSize: { x: 0.05, y: 0.05, z: 0.05 },
      };
      if (!vertexCount || propCount < 3) return fallback;
      const dv = new DataView(arrayBuffer, headerEnd);
      const stride = propCount * 4;
      const step = Math.max(1, Math.floor(vertexCount / 8192));
      let minX = Infinity, minY = Infinity, minZ = Infinity;
      let maxX = -Infinity, maxY = -Infinity, maxZ = -Infinity;
      let sx = 0, sy = 0, sz = 0, n = 0;
      for (let i = 0; i < vertexCount; i += step) {
        const off = i * stride;
        const x = dv.getFloat32(off, true), y = dv.getFloat32(off + 4, true), z = dv.getFloat32(off + 8, true);
        minX = Math.min(minX, x); maxX = Math.max(maxX, x);
        minY = Math.min(minY, y); maxY = Math.max(maxY, y);
        minZ = Math.min(minZ, z); maxZ = Math.max(maxZ, z);
        sx += x; sy += y; sz += z; n++;
      }
      return {
        center: { x: sx / n, y: sy / n, z: sz / n },
        min: { x: minX, y: minY, z: minZ },
        max: { x: maxX, y: maxY, z: maxZ },
        halfSize: { x: (maxX - minX) / 2, y: (maxY - minY) / 2, z: (maxZ - minZ) / 2 },
      };
    }

    function placementAnchorFromBounds(bounds) {
      return {
        x: bounds.center.x,
        y: bounds.center.y,
        z: bounds.min.z,
      };
    }

    async function initScene() {
      sceneReady = true;
      hideLoadProgress();
      status('就绪 · 拖入 PLY 模型开始');
      renderList();
    }

    function anchorPlyArrayBuffer(arrayBuffer, anchor) {
      const meta = parsePlyHeader(arrayBuffer);
      if (!meta.vertexCount) return arrayBuffer;
      const out = arrayBuffer.slice(0);
      const dv = new DataView(out, meta.headerEnd);
      const stride = meta.propCount * 4;
      for (let i = 0; i < meta.vertexCount; i++) {
        const off = i * stride;
        dv.setFloat32(off, dv.getFloat32(off, true) - anchor.x, true);
        dv.setFloat32(off + 4, dv.getFloat32(off + 4, true) - anchor.y, true);
        dv.setFloat32(off + 8, dv.getFloat32(off + 8, true) - anchor.z, true);
      }
      return out;
    }

    function placementOpts(p) {
      const q = new THREE.Quaternion().setFromEuler(new THREE.Euler(0, 0, p.yaw_deg * Math.PI / 180, 'XYZ'));
      return {
        position: [p.x, p.y, p.z],
        rotation: [q.x, q.y, q.z, q.w],
        scale: [p.scale, p.scale, p.scale],
        splatAlphaRemovalThreshold: PLY_ALPHA,
      };
    }

    function syncPlacementTransform(p) {
      if (!viewer && viewer.splatMesh || p.sceneIdx == null) return;
      const scene = viewer.splatMesh.getScene(p.sceneIdx);
      scene.position.set(p.x, p.y, p.z);
      scene.quaternion.setFromEuler(new THREE.Euler(0, 0, p.yaw_deg * Math.PI / 180, 'XYZ'));
      scene.scale.set(p.scale, p.scale, p.scale);
      viewer.splatMesh.updateTransforms();
      viewer.forceRenderNextFrame();
    }

    function checkWebGL() {
      const c = document.createElement('canvas');
      return !!(c.getContext('webgl2') || c.getContext('webgl'));
    }

    function tryCreateRenderer(root, w, h) {
      for (const precision of ['highp', 'mediump', 'lowp']) {
        try {
          const r = new THREE.WebGLRenderer({
            antialias: false,
            alpha: true,
            precision,
            failIfMajorPerformanceCaveat: false,
            preserveDrawingBuffer: true,
          });
          r.setPixelRatio(Math.min(devicePixelRatio || 1, 2));
          r.setSize(w, h);
          r.domElement.style.cssText = 'width:100%;height:100%;display:block';
          root.appendChild(r.domElement);
          return r;
        } catch (_) {}
      }
      return null;
    }

    function applyViewBackground(mode = viewBgMode) {
      viewBgMode = VIEW_BACKGROUNDS[mode] ? mode : 'cream';
      const t = VIEW_BACKGROUNDS[viewBgMode];
      el('view').style.background = t.css;
      el('view').classList.toggle('view-bg-black', viewBgMode === 'black');
      el('viewBgSelect').value = viewBgMode;
      if (viewer && viewer.renderer) {
        viewer.renderer.setClearColor(t.hex, viewBgMode === 'black' ? 1 : 0);
        viewer.forceRenderNextFrame();
      }
      localStorage.setItem('viewBackground', viewBgMode);
    }

    function tuneCamera() {
      if (!viewer) return;
      for (const cam of [viewer.perspectiveCamera, viewer.orthographicCamera, viewer.camera]) {
        if (cam && cam.isCamera) { cam.near = 0.001; cam.far = 2000; cam.updateProjectionMatrix(); }
      }
      if (viewer.controls) {
        viewer.controls.target.set(VIEW_OFFSET.x, VIEW_OFFSET.y, VIEW_OFFSET.z);
        viewer.controls.minDistance = 0.01;
        viewer.controls.maxDistance = 50;
        viewer.controls.enableZoom = viewer.controls.enableRotate = viewer.controls.enablePan = true;
      }
    }

    function setupViewHelper() {
      const host = el('viewHelper');
      host.innerHTML = '';
      if (!viewer) return;
      viewHelper = new ViewHelper(viewer.camera, host);
      host.onpointerdown = (e) => e.stopPropagation();
      host.onpointerup = (e) => {
        viewHelper.handleClick(e);
        viewer.forceRenderNextFrame();
        if (overlayRenderer && viewHelper) viewHelper.render(overlayRenderer);
      };
    }

    function startOverlayLoop() {
      const loop = () => {
        overlayRaf = requestAnimationFrame(loop);
        if (overlayRenderer && viewHelper && viewer && viewer.initialized) viewHelper.render(overlayRenderer);
      };
      if (overlayRaf) cancelAnimationFrame(overlayRaf);
      overlayRaf = requestAnimationFrame(loop);
    }

    async function ensureViewer() {
      if (viewer) return;
      if (!checkWebGL()) throw new Error('WebGL 不可用');
      const root = el('viewMain');
      for (let i = 0; i < 120 && (root.clientWidth < 1 || root.clientHeight < 1); i++) {
        await new Promise((r) => requestAnimationFrame(r));
      }
      sharedRenderer = tryCreateRenderer(root, root.clientWidth, root.clientHeight);
      if (!sharedRenderer) throw new Error('无法创建 WebGL 渲染器');
      applyViewBackground();
      try {
        viewer = new GaussianSplats3D.Viewer({ rootElement: root, renderer: sharedRenderer, ...viewerOpts });
        viewer.start();
        tuneCamera();
        initRigOverlayScene();
        setupViewHelper();
        overlayRenderer = new THREE.WebGLRenderer({ alpha: true, antialias: false });
        overlayRenderer.setSize(128, 128);
        setupGizmo();
        setupRenderCamera();
        setupPathPick();
        startOverlayLoop();
      } catch (e) {
        viewer = null;
        throw e;
      }
    }

    const _pickRay = new THREE.Raycaster();
    const _pickMouse = new THREE.Vector2();

    function setupPathPick() {
      viewer.renderer.domElement.addEventListener('pointerdown', (e) => {
        if (!rigOpen || e.button !== 0) return;
        const rect = viewer.renderer.domElement.getBoundingClientRect();
        _pickMouse.set(
          ((e.clientX - rect.left) / rect.width) * 2 - 1,
          -((e.clientY - rect.top) / rect.height) * 2 + 1,
        );
        _pickRay.setFromCamera(_pickMouse, viewer.camera);
        pathRoot && pathRoot.updateMatrixWorld(true);

        const objHits = _pickRay.intersectObjects([...cpMeshes, ...markerMeshes], true);
        if (objHits.length) {
          let obj = objHits[0].object;
          while (obj && obj.userData.cpPointIdx == null && obj.parent) obj = obj.parent;
          if (obj && obj.userData && obj.userData.cpPointIdx != null) {
            const si = obj.userData.cpSegIdx;
            const pi = obj.userData.cpPointIdx;
            if (si === selectedCpSegIdx && pi === selectedCpPointIdx) {
              confirmPathKeypoint();
            } else {
              selectPathCp(si, pi);
            }
            return;
          }
          if (rigGizmoMode || placementGizmoMode || markerGizmoMode) return;
          if (obj.userData.markerIdx != null) {
            selectMarker(obj.userData.markerIdx);
            return;
          }
        }

        if (pickPathSegment(e)) return;

        if (rigGizmoMode || placementGizmoMode || markerGizmoMode) return;
      });
    }

    function setupGizmo() {
      if (!rigOverlayScene) initRigOverlayScene();
      if (transformControls) {
        try { transformControls.dispose(); } catch (_) {}
      }
      pivot = new THREE.Object3D();
      viewer.threeScene.add(pivot);
      transformControls = new TransformControls(viewer.camera, viewer.renderer.domElement);
      rigOverlayScene.add(transformControls.getHelper());
      applyAlwaysOnTop(transformControls.getHelper());
      applyGizmoForSelection();
      transformControls.addEventListener('dragging-changed', (e) => {
        if (viewer.controls) viewer.controls.enabled = !e.value;
        if (e.value && selected >= 0 && transformControls.object === pivot) {
          placementDragSnapshot = snapshotPlacement(placements[selected]);
        }
        if (!e.value) {
          placementDragSnapshot = null;
          syncActivePathFromState();
          renderPathGroupList();
          if (pathSlideActive && cameraMarkers.length >= 2 && !isPathSlideBlocked()) {
            resumePathSlideIfPlaying();
          }
        }
      });
      transformControls.addEventListener('change', () => {
        if (syncingFromGizmo) return;
        const obj = transformControls.object;
        if (obj && obj.userData && obj.userData.cpPointIdx != null) {
          const i = obj.userData.cpSegIdx;
          const j = obj.userData.cpPointIdx;
          const p = obj.position;
          cameraPathSegments[i].points[j].x = p.x;
          cameraPathSegments[i].points[j].y = p.y;
          cameraPathSegments[i].points[j].z = p.z;
          syncKeypointOrderAfterDrag(i, j, obj);
          updatePathLine();
          el('rigPreviewStatus').textContent = '需重新渲染';
          viewer.forceRenderNextFrame();
          return;
        }
        if (obj && obj.userData && obj.userData.markerIdx != null) {
          const i = obj.userData.markerIdx;
          const p = obj.position;
          cameraMarkers[i].x = p.x;
          cameraMarkers[i].y = p.y;
          cameraMarkers[i].z = p.z;
          applyMarkerToRig(cameraMarkers[i]);
          refreshPathVisuals();
          el('rigPreviewStatus').textContent = '需重新渲染';
          return;
        }
        if (rigOpen && rigGizmoMode && transformControls.object === renderCamRig) {
          syncPoseFromRig(renderCameraPose);
          syncCameraHelper();
          updateRigSliders();
          el('rigPreviewStatus').textContent = '需重新渲染';
          viewer.forceRenderNextFrame();
          return;
        }
        if (selected < 0) return;
        const p = placements[selected];
        if (!p) return;
        const oldSnap = placementDragSnapshot;
        p.x = pivot.position.x;
        p.y = pivot.position.y;
        p.z = pivot.position.z;
        const euler = new THREE.Euler().setFromQuaternion(pivot.quaternion, 'XYZ');
        p.yaw_deg = THREE.MathUtils.radToDeg(euler.z);
        syncPlacementTransform(p);
        if (oldSnap) {
          applySceneTransformDelta(oldSnap, p);
          placementDragSnapshot = snapshotPlacement(p);
        }
        updateSelSliders();
      });
    }

    function attachGizmo() {
      if (!transformControls || !pivot) {
        transformControls && transformControls.detach();
        return;
      }
      applyGizmoForSelection();
      if (selectedCpSegIdx >= 0 && selectedCpPointIdx >= 0 && markerGizmoMode) {
        const cpMesh = findCpMesh(selectedCpSegIdx, selectedCpPointIdx);
        if (cpMesh) {
          transformControls.setMode('translate');
          transformControls.attach(cpMesh);
          return;
        }
      }
      if (selectedMarkerIdx >= 0 && markerGizmoMode && markerMeshes[selectedMarkerIdx]) {
        transformControls.setMode('translate');
        transformControls.attach(markerMeshes[selectedMarkerIdx]);
        return;
      }
      if (rigOpen && rigGizmoMode && renderCamRig) {
        transformControls.setMode(rigGizmoMode);
        transformControls.attach(renderCamRig);
        return;
      }
      if (selected < 0 || !placementGizmoMode) {
        transformControls.detach();
        return;
      }
      const p = placements[selected];
      if (!p) {
        transformControls.detach();
        return;
      }
      transformControls.setMode(placementGizmoMode);
      syncingFromGizmo = true;
      pivot.position.set(p.x, p.y, p.z);
      pivot.quaternion.setFromEuler(new THREE.Euler(0, 0, p.yaw_deg * Math.PI / 180, 'XYZ'));
      pivot.scale.set(p.scale, p.scale, p.scale);
      transformControls.attach(pivot);
      syncingFromGizmo = false;
    }

    async function addPlacementFromFile(file, loadToken = sessionResetToken) {
      if (!sceneReady) throw new Error('场景尚未就绪');
      status(`加载 ${file.name}…`);
      setLoadProgress(20, `解析 ${file.name}…`);
      let ab = fileCache.get(file.name);
      if (!ab) {
        ab = await file.arrayBuffer();
        if (isSessionAborted(loadToken)) return;
        fileCache.set(file.name, ab);
        idbPutAsset(file.name, ab).catch((e) => console.warn('模型缓存写入失败', e));
      }
      const bounds = computePlyBounds(ab);
      const anchor = placementAnchorFromBounds(bounds);
      const decRatio = getVisualDecimationRatio(file.size);
      let visualAb = decimatePlyArrayBuffer(ab, decRatio);
      visualAb = anchorPlyArrayBuffer(visualAb, anchor);
      const splatBuffer = await GaussianSplats3D.PlyLoader.loadFromFileData(
        visualAb, PLY_ALPHA, undefined, undefined, PLY_ALPHA, 0, false, 0,
      );
      if (isSessionAborted(loadToken)) return;
      const p = {
        name: file.name,
        x: 0, y: 0, z: defaultZ,
        scale: defaultScale,
        yaw_deg: 0,
        sceneIdx: null,
        center: [anchor.x, anchor.y, anchor.z],
      };
      const sceneIdx = _n(viewer.splatMesh && viewer.splatMesh.scenes && viewer.splatMesh.scenes.length, 0);
      await viewer.addSplatBuffers([splatBuffer], [placementOpts(p)], true, false, false, false, true);
      if (isSessionAborted(loadToken)) {
        try { await viewer.removeSplatScene(sceneIdx, false); } catch (_) {}
        return;
      }
      p.sceneIdx = sceneIdx;
      placements.push(p);
      selectPlacement(placements.length - 1);
      hideLoadProgress();
      status(`已放置 ${file.name}（共 ${placements.length} 个）`);
      renderList();
    }

    function selectPlacement(idx) {
      selected = idx;
      if (idx >= 0) {
        selectedMarkerIdx = -1;
        selectedCpSegIdx = -1;
        selectedCpPointIdx = -1;
        markerGizmoMode = null;
        rigGizmoMode = null;
        updateRigGizmoUI();
        el('gizmoMoveRig').classList.remove('active');
        el('gizmoRotateRig').classList.remove('active');
        if (rigOpen && cameraMarkers.length >= 2) resumePathSlideIfPlaying();
      }
      if (idx < 0) placementGizmoMode = null;
      updatePlacementGizmoUI();
      renderList();
      const enabled = idx >= 0;
      for (const id of ['selX', 'selY', 'selZ', 'selScale', 'selYaw']) el(id).disabled = !enabled;
      if (enabled) {
        updateSelSliders();
        el('selHint').textContent = placements[idx].name;
      } else {
        el('selHint').textContent = '从列表选中模型';
      }
      attachGizmo();
    }

    function updateSelSliders() {
      if (selected < 0) return;
      const p = placements[selected];
      el('selX').value = p.x; el('selXVal').textContent = p.x.toFixed(3);
      el('selY').value = p.y; el('selYVal').textContent = p.y.toFixed(3);
      el('selZ').value = p.z; el('selZVal').textContent = p.z.toFixed(4);
      el('selScale').value = p.scale; el('selScaleVal').textContent = p.scale.toFixed(3);
      el('selYaw').value = p.yaw_deg; el('selYawVal').textContent = `${p.yaw_deg.toFixed(0)}°`;
    }

    function onSelSliderChange() {
      if (selected < 0) return;
      const p = placements[selected];
      const oldSnap = snapshotPlacement(p);
      p.x = parseFloat(el('selX').value);
      p.y = parseFloat(el('selY').value);
      p.z = parseFloat(el('selZ').value);
      p.scale = parseFloat(el('selScale').value);
      p.yaw_deg = parseFloat(el('selYaw').value);
      syncPlacementTransform(p);
      applySceneTransformDelta(oldSnap, p);
      updateSelSliders();
      syncingFromGizmo = true;
      pivot.position.set(p.x, p.y, p.z);
      pivot.quaternion.setFromEuler(new THREE.Euler(0, 0, p.yaw_deg * Math.PI / 180, 'XYZ'));
      syncingFromGizmo = false;
    }

    function removePlacement(idx) {
      const p = placements[idx];
      if (!p || p.sceneIdx == null || !viewer) return;
      viewer.removeSplatScene(p.sceneIdx, false);
      for (const other of placements) {
        if (other.sceneIdx != null && other.sceneIdx > p.sceneIdx) other.sceneIdx--;
      }
      placements.splice(idx, 1);
      if (selected === idx) selectPlacement(-1);
      else if (selected > idx) selected--;
      viewer.forceRenderNextFrame();
      renderList();
      status(`已删除，剩余 ${placements.length} 个`);
    }

    function renderList() {
      const list = el('sceneList');
      list.innerHTML = '';
      placements.forEach((p, i) => {
        const row = document.createElement('div');
        row.className = 'scene-row' + (i === selected ? ' active' : '');
        row.innerHTML = `<span class="scene-name">${p.name}</span>`;
        const del = document.createElement('button');
        del.type = 'button'; del.className = 'icon-btn'; del.textContent = '×';
        del.onclick = (e) => { e.stopPropagation(); removePlacement(i); };
        row.appendChild(del);
        row.onclick = () => selectPlacement(i);
        list.appendChild(row);
      });
    }

    function placementsToJson() {
      return placements.map((p) => ({
        asset: p.name,
        x: p.x, y: p.y, z: p.z,
        scale: p.scale,
        yaw_deg: p.yaw_deg,
        center: p.center,
        pitch_deg: 0,
        roll_deg: 0,
        visible: true,
      }));
    }

    function configToJson() {
      syncActivePathFromState();
      return {
        version: 2,
        defaults: {
          scale: defaultScale,
          z: defaultZ,
        },
        view: {
          background: viewBgMode,
          rigOpen,
        },
        placements: placementsToJson(),
        cameraPaths: cameraPaths.map((p) => ({
          id: p.id,
          name: p.name,
          markers: p.markers,
          segments: p.segments,
          framesPerSeg: p.framesPerSeg,
          fps: p.fps,
        })),
        activePathId: activePathId || null,
        renderSettings: getRenderSettings(),
        renderCamera: getRenderCameraPoseJson(),
      };
    }

    function exportConfigJson() {
      const data = configToJson();
      const ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
      const blob = new Blob([JSON.stringify(data, null, 2) + '\n'], { type: 'application/json' });
      const link = document.createElement('a');
      link.download = `scene_config_${ts}.json`;
      link.href = URL.createObjectURL(blob);
      link.click();
      URL.revokeObjectURL(link.href);
      status(`已导出 JSON · ${data.placements.length} 模型 · ${data.cameraPaths.length} 轨迹`);
    }

    async function clearAllPlacementsFromViewer() {
      placements.length = 0;
      selected = -1;
      const sceneCount = _n(viewer && viewer.splatMesh && viewer.splatMesh.scenes && viewer.splatMesh.scenes.length, 0);
      if (sceneCount > 0) {
        const indexes = Array.from({ length: sceneCount }, (_, i) => i);
        try {
          await viewer.removeSplatScenes(indexes, false);
        } catch (e) {
          console.warn('批量清空模型失败，改为逐个移除', e);
          while (viewer && viewer.splatMesh && viewer.splatMesh.scenes && viewer.splatMesh.scenes.length > 0) {
            await viewer.removeSplatScene(0, false);
          }
        }
      }
      viewer && viewer.forceRenderNextFrame && viewer.forceRenderNextFrame();
    }

    function resetCameraEditorState() {
      stopPathSlidePreview();
      pathSlidePlaying = false;
      if (rigOpen) closeRigCamera();
      cameraMarkers = [];
      cameraPathSegments = [];
      cameraPaths = [];
      activePathId = null;
      nextPathId = 1;
      markerDragFromIdx = -1;
      selectedMarkerIdx = -1;
      selectedCpSegIdx = -1;
      selectedCpPointIdx = -1;
      markerGizmoMode = null;
      rigGizmoMode = null;
      placementGizmoMode = null;
      clearPathVisuals();
      renderMarkerList();
      renderPathGroupList();
      updatePathTransportUI();
      updateKeypointEditUI();
      attachGizmo();
    }

    function resetEditorDefaults() {
      defaultScale = 0.12;
      defaultZ = DEFAULT_Z_FALLBACK;
      el('defaultScale').value = defaultScale;
      el('scaleVal').textContent = defaultScale.toFixed(2);
      el('defaultZ').value = defaultZ;
      el('zVal').textContent = defaultZ.toFixed(4);
    }

    async function clearEditorSession() {
      if (!confirm('确定清空当前场景？\n\n将删除所有模型、相机轨迹和浏览器中的已保存配置，且无法撤销。')) return;
      sessionResetToken++;
      hideLoadProgress();
      fileCache.clear();
      await clearAllPlacementsFromViewer();
      resetCameraEditorState();
      resetEditorDefaults();
      selectPlacement(-1);
      renderList();
      const emptyCfg = JSON.stringify(emptyConfigJson());
      try {
        localStorage.setItem(CONFIG_STORAGE_KEY, emptyCfg);
      } catch (_) {
        localStorage.removeItem(CONFIG_STORAGE_KEY);
      }
      try {
        await idbClearAll();
      } catch (e) {
        console.warn('清空模型缓存失败', e);
      }
      if (hostMode === 'server') {
        try {
          await fetch(apiUrl('api/placements'), {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: emptyCfg,
          });
        } catch (_) {}
      }
      el('rigPreviewStatus').textContent = '未渲染';
      status('已清空 · 可重新拖入模型');
      viewer && viewer.forceRenderNextFrame && viewer.forceRenderNextFrame();
    }

    async function mergeScene() {
      if (hostMode !== 'server') {
        throw new Error('合并完整模型需本地运行 python serve_editor.py');
      }
      status('合并完整模型中…');
      const res = await fetch(apiUrl('api/merge'), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ out: 'scene.ply' }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || '合并失败');
      status('已生成 scene.ply（完整模型）');
    }

    async function savePlacements() {
      let data;
      try {
        data = configToJson();
      } catch (e) {
        throw new Error(`配置生成失败: ${e.message}`);
      }
      let bodyText = '';
      try {
        bodyText = JSON.stringify(data);
      } catch (e) {
        throw new Error(`配置无法序列化为 JSON: ${e.message}`);
      }
      let res;
      try {
        if (hostMode === 'static') {
          status('正在写入浏览器缓存…');
          await idbPutAllFromCache();
          try {
            localStorage.setItem(CONFIG_STORAGE_KEY, bodyText);
          } catch (e) {
            throw new Error(`浏览器存储空间不足: ${e.message} · 可删除部分模型或用导出 JSON`);
          }
          const camNote = data.cameraPaths.length ? `${data.cameraPaths.length} 条轨迹` : '无相机轨迹';
          status(`已保存到浏览器 · ${data.placements.length} 模型 · ${camNote} · 刷新可恢复`);
          return;
        }
        res = await fetch(apiUrl('api/placements'), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: bodyText,
        });
      } catch (_) {
        throw new Error('无法连接保存接口 · 请用 python serve_editor.py 启动，并访问 http://127.0.0.1:8080/placement_editor.html');
      }
      const body = await res.json().catch(() => ({}));
      if (!res.ok) {
        const msg = body.error || `HTTP ${res.status}`;
        if (/JSON list/i.test(msg)) {
          throw new Error('保存失败：服务器版本过旧 · 请关闭旧终端里的 serve_editor.py，重新运行后再保存');
        }
        throw new Error(`保存失败：${msg}`);
      }
      await idbPutAllFromCache().catch((e) => console.warn('模型缓存写入失败', e));
      const camNote = data.cameraPaths.length ? `${data.cameraPaths.length} 条轨迹` : '无相机轨迹';
      status(`已保存 · ${data.placements.length} 模型 · ${camNote}`);
    }

    async function checkSaveApiHealth() {
      if (hostMode === 'static') return null;
      try {
        const res = await fetchWithTimeout(apiUrl('api/health'));
        if (!res.ok) return false;
        const data = await res.json().catch(() => ({}));
        return data.configVersion >= 2;
      } catch (_) {
        return null;
      }
    }

    async function restorePlacements(saved, loadToken = sessionResetToken) {
      if (!Array.isArray(saved) || !saved.length) return;
      const missing = [];
      for (const item of saved) {
        if (isSessionAborted(loadToken)) return;
        const name = item.asset;
        if (!name) continue;
        let ab = fileCache.get(name);
        if (!ab) {
          missing.push(name);
          continue;
        }
        const file = new File([ab], name);
        const p = {
          name,
          x: _n(item.x, 0), y: _n(item.y, 0), z: _n(item.z, defaultZ),
          scale: _n(item.scale, defaultScale),
          yaw_deg: _n(item.yaw_deg, 0),
          sceneIdx: null,
          center: _n(item.center, [0, 0, 0]),
        };
        const bounds = computePlyBounds(ab);
        const anchor = item.center
          ? { x: item.center[0], y: item.center[1], z: item.center[2] }
          : placementAnchorFromBounds(bounds);
        if (!item.center) p.center = [anchor.x, anchor.y, anchor.z];
        let visualAb = decimatePlyArrayBuffer(ab, getVisualDecimationRatio(ab.byteLength));
        visualAb = anchorPlyArrayBuffer(visualAb, anchor);
        const splatBuffer = await GaussianSplats3D.PlyLoader.loadFromFileData(
          visualAb, PLY_ALPHA, undefined, undefined, PLY_ALPHA, 0, false, 0,
        );
        if (isSessionAborted(loadToken)) return;
        const sceneIdx = viewer.splatMesh.scenes.length;
        await viewer.addSplatBuffers([splatBuffer], [placementOpts(p)], true, false, false, false, true);
        if (isSessionAborted(loadToken)) return;
        p.sceneIdx = sceneIdx;
        placements.push(p);
      }
      renderList();
      if (missing.length) {
        status(`已恢复 ${placements.length} 个模型 · 缺少 ${missing.length} 个 PLY（请重新拖入或先点保存）: ${missing.slice(0, 3).join('、')}${missing.length > 3 ? '…' : ''}`);
      } else {
        status(`已恢复 ${placements.length} 个模型`);
      }
    }

    function setupDragDrop() {
      const view = el('view');
      const prevent = (e) => { e.preventDefault(); e.stopPropagation(); };
      view.addEventListener('dragenter', (e) => { prevent(e); view.classList.add('drag-over'); });
      view.addEventListener('dragover', prevent);
      view.addEventListener('dragleave', (e) => { prevent(e); view.classList.remove('drag-over'); });
      view.addEventListener('drop', async (e) => {
        prevent(e);
        view.classList.remove('drag-over');
        const files = [...(e.dataTransfer && e.dataTransfer.files || [])].filter((f) => f.name.toLowerCase().endsWith('.ply'));
        if (!files.length) { status('请拖入 .ply 模型文件'); return; }
        for (const f of files) {
          try { await addPlacementFromFile(f); } catch (err) { status(`失败: ${err.message}`); }
        }
      });
    }

    function showError(e) {
      console.error(e);
      hideLoadProgress();
      status(`错误: ${e.message}`);
    }

    el('importBtn').onclick = () => el('pickFile').click();
    el('pickFile').onchange = async () => {
      const files = [...(el('pickFile').files || [])];
      el('pickFile').value = '';
      for (const f of files) {
        try { await addPlacementFromFile(f); } catch (e) { showError(e); }
      }
    };
    el('viewBgSelect').onchange = (e) => applyViewBackground(e.target.value);
    function setSliderValueUnbounded(slider, v) {
      if (Number.isNaN(v)) return;
      const curMin = parseFloat(slider.min);
      const curMax = parseFloat(slider.max);
      const pad = Math.max(Math.abs(v) * 0.5, 1);
      if (v < curMin) slider.min = String(v - pad);
      if (v > curMax) slider.max = String(v + pad);
      slider.value = v;
      slider.dispatchEvent(new Event('input', { bubbles: true }));
    }

    function makeValEditable(valId, sliderId, opts = {}) {
      const valEl = el(valId);
      if (!valEl) return;
      const parse = opts.parse || ((t) => parseFloat(String(t).replace(/[^\d.-]/g, '')));
      const canEdit = opts.canEdit || (() => !el(sliderId).disabled);
      valEl.classList.add('val-editable');
      valEl.title = '点击输入数值';
      valEl.addEventListener('click', () => {
        if (!canEdit()) return;
        const slider = el(sliderId);
        const input = document.createElement('input');
        input.type = 'number';
        input.className = 'val-inline-input';
        input.value = parse(valEl.textContent);
        input.step = slider.step || 'any';
        valEl.style.display = 'none';
        valEl.insertAdjacentElement('afterend', input);
        input.focus();
        input.select();
        const finish = (apply) => {
          if (apply) {
            const v = parse(input.value);
            if (!Number.isNaN(v)) {
              setSliderValueUnbounded(slider, v);
            }
          }
          input.remove();
          valEl.style.display = '';
        };
        input.addEventListener('blur', () => finish(true));
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') { e.preventDefault(); finish(true); }
          if (e.key === 'Escape') finish(false);
        });
      });
    }

    function setupEditableVals() {
      [
        ['scaleVal', 'defaultScale'],
        ['zVal', 'defaultZ'],
        ['selXVal', 'selX'],
        ['selYVal', 'selY'],
        ['selZVal', 'selZ'],
        ['selScaleVal', 'selScale'],
        ['pathFramesVal', 'pathFrames', { parse: (v) => parseInt(v, 10) }],
        ['pathFpsVal', 'pathFps', { parse: (v) => parseInt(v, 10) }],
        ['pathPinTVal', 'pathPinT', { parse: (t) => parseFloat(String(t).replace(/%/g, '')), canEdit: () => cameraMarkers.length >= 2 }],
        ['rigXVal', 'rigX'],
        ['rigYVal', 'rigY'],
        ['rigZVal', 'rigZ'],
        ['rigFovVal', 'rigFov', { parse: (t) => parseFloat(String(t).replace(/°/g, '')) }],
        ['rigNearVal', 'rigNear'],
        ['rigFarVal', 'rigFar'],
      ].forEach((args) => makeValEditable(...args));
    }

    el('defaultScale').oninput = (e) => {
      defaultScale = parseFloat(e.target.value);
      el('scaleVal').textContent = defaultScale.toFixed(2);
    };
    el('defaultZ').oninput = (e) => {
      defaultZ = parseFloat(e.target.value);
      el('zVal').textContent = defaultZ.toFixed(4);
    };
    for (const id of ['selX', 'selY', 'selZ', 'selScale', 'selYaw']) el(id).oninput = onSelSliderChange;
    el('gizmoMove').onclick = () => togglePlacementGizmo('translate');
    el('gizmoRotate').onclick = () => togglePlacementGizmo('rotate');
    el('gizmoMoveRig').onclick = () => toggleRigGizmo('translate');
    el('gizmoRotateRig').onclick = () => toggleRigGizmo('rotate');
    el('toggleRigBtn').onclick = () => toggleRigCamera();
    el('tabModelsBtn').onclick = () => switchPanelTab('models');
    el('tabCameraBtn').onclick = () => switchPanelTab('camera');
    el('saveBtn').onclick = () => savePlacements().catch(showError);
    el('importJsonBtn').onclick = () => el('importConfigFile').click();
    el('importConfigFile').onchange = async () => {
      const file = el('importConfigFile').files && el('importConfigFile').files[0];
      el('importConfigFile').value = '';
      if (!file) return;
      try { await importConfigFromFile(file); } catch (e) { showError(e); }
    };
    el('exportJsonBtn').onclick = () => exportConfigJson();
    el('clearBtn').onclick = () => clearEditorSession().catch(showError);
    el('mergeBtn').onclick = () => mergeScene().catch(showError);
    el('addMarkerBtn').onclick = () => addCameraMarker();
    el('addPathGroupBtn').onclick = () => addCameraPathGroup();
    el('deletePathGroupBtn').onclick = () => deleteCameraPathGroup();
    el('confirmKeypointBtn').onclick = () => confirmPathKeypoint();
    el('deleteKeypointBtn').onclick = () => deleteSelectedPathKeypoint();
    el('pathFrames').oninput = (e) => {
      pathFramesPerSeg = parseInt(e.target.value, 10);
      el('pathFramesVal').textContent = pathFramesPerSeg;
      syncActivePathFromState();
    };
    el('pathFps').oninput = (e) => {
      pathFps = parseInt(e.target.value, 10);
      el('pathFpsVal').textContent = pathFps;
      syncActivePathFromState();
    };
    el('pathPinT').oninput = onPathPinTChange;
    el('pathPlayBtn').onclick = () => playPathSlide();
    el('pathPauseBtn').onclick = () => pausePathSlide();
    el('renderPreviewBtn').onclick = () => onRenderPreviewClick().catch(showError);
    el('renderExportSingleBtn').onclick = () => gaussianRenderFromRig().catch(showError);
    el('renderExportSequenceBtn').onclick = () => exportPathSequencePngs().catch(showError);
    el('renderPathVideoBtn').onclick = () => renderPathVideoPreview().catch(showError);
    for (const id of ['rigX', 'rigY', 'rigZ']) el(id).oninput = onRigSliderChange;
    for (const id of ['rigYaw', 'rigPitch', 'rigRoll']) el(id).oninput = onRigRotationChange;
    for (const id of ['rigFov', 'rigNear', 'rigFar']) el(id).oninput = syncRenderCameraParams;
    el('renderWidth').onchange = syncRenderCameraParams;
    el('renderHeight').onchange = syncRenderCameraParams;
    el('showFrustum').onchange = (e) => {
      const show = e.target.checked;
      if (cameraHelper) {
        cameraHelper.visible = rigOpen && show;
        if (show) styleCameraHelperOnTop();
      }
      viewer && viewer.forceRenderNextFrame();
    };

    const rigPreviewCanvas = el('rigPreviewCanvas');
    rigPreviewCanvas.width = RIG_PREVIEW_W;
    rigPreviewCanvas.height = RIG_PREVIEW_H;

    window.addEventListener('keydown', (e) => {
      if (e.target.matches('input,select,textarea')) return;
      if (selected >= 0) {
        if (e.key === 'q' || e.key === 'Q') togglePlacementGizmo('translate');
        if (e.key === 'w' || e.key === 'W') togglePlacementGizmo('rotate');
      } else if (rigOpen) {
        if (selectedCpPointIdx >= 0) {
          if (e.key === 'Enter') { confirmPathKeypoint(); return; }
          if (e.key === 'Delete' || e.key === 'Backspace') { e.preventDefault(); deleteSelectedPathKeypoint(); return; }
          if (e.key === 'q' || e.key === 'Q') toggleRigGizmo('translate');
        } else if (selectedMarkerIdx >= 0 || selectedCpSegIdx >= 0) {
          if (e.key === 'q' || e.key === 'Q') toggleRigGizmo('translate');
        } else {
          if (e.key === 'q' || e.key === 'Q') toggleRigGizmo('translate');
          if (e.key === 'w' || e.key === 'W') toggleRigGizmo('rotate');
        }
      }
    });

    window.addEventListener('resize', () => {
      if (!(viewer && viewer.renderer && viewer.renderer.domElement && viewer.renderer.domElement.parentElement)) return;
      const root = el('viewMain');
      if (root.clientWidth > 0 && root.clientHeight > 0) viewer.renderer.setSize(root.clientWidth, root.clientHeight);
    });

    setupDragDrop();
    applyViewBackground();
    updatePlacementGizmoUI();
    updateRigGizmoUI();

    setupEditableVals();
    updatePathTransportUI();

    (async () => {
      const loadToken = sessionResetToken;
      try {
        status('正在检测运行环境…');
        hostMode = await detectHostMode();
        if (isSessionAborted(loadToken)) return;
        updateHostModeUI();
        status('正在加载 3D 引擎…');
        await ensureViewer();
        if (isSessionAborted(loadToken)) return;
        await initScene();
        status('正在恢复场景…');
        const cfg = await loadSavedConfig();
        if (isSessionAborted(loadToken)) return;
        applyConfigMeta(cfg);
        await preloadAssetsForConfig(cfg, loadToken);
        if (isSessionAborted(loadToken)) return;
        const savedPlacements = placementsFromConfig(cfg);
        if (savedPlacements.length) {
          await restorePlacements(savedPlacements, loadToken);
        } else if (hostMode === 'server') {
          status('就绪 · 拖入模型恢复摆放（需同名文件）');
        }
        if (isSessionAborted(loadToken)) return;
        restoreCameraPaths(cfg.cameraPaths, cfg.activePathId, cfg.renderSettings, cfg.renderCamera);
        restoreRigUiState(cfg);
        if (isSessionAborted(loadToken)) return;
        const saveOk = await checkSaveApiHealth();
        if (saveOk === false) {
          status('就绪 · 保存接口版本过旧，请重启 serve_editor.py 后再点保存');
        } else if (savedPlacements.length || cameraPaths.length) {
          const modeNote = hostMode === 'static' ? ' · 已从浏览器恢复' : '';
          status(`就绪${modeNote} · ${placements.length} 模型 · ${cameraPaths.length} 轨迹`);
        } else if (sceneReady) {
          const modeNote = hostMode === 'static' ? ' · 在线版（点保存后刷新可恢复）' : '';
          status(`就绪${modeNote} · 拖入 PLY 模型开始`);
        }
      } catch (e) { showError(e); }
    })();
  </script>
</body>
</html>
