<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>摆放器</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #111; color: #eee; height: 100vh; display: flex; overflow: hidden; }
    #view { flex: 1; position: relative; min-width: 0; background: #f5f0eb; }
    #view.view-bg-black { background: #111; }
    #viewMain { position: absolute; inset: 0; }
    #viewMain > canvas { width: 100% !important; height: 100% !important; display: block; }
    #view.drag-over::after {
      content: '松开以放置模型';
      position: absolute; inset: 0; pointer-events: none; z-index: 5;
      display: flex; align-items: center; justify-content: center;
      background: rgba(45, 108, 223, 0.25); border: 2px dashed #6cf;
      font-size: 20px; color: #fff;
    }
    #viewHelper { position: absolute; right: 12px; top: 12px; width: 128px; height: 128px; pointer-events: auto; z-index: 3; }
    #panel {
      width: 300px; background: #1a1a1a; border-left: 1px solid #333;
      padding: 14px 16px 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 0;
    }
    .panel-chrome {
      display: flex; flex-direction: column; gap: 10px;
      padding-bottom: 12px; border-bottom: 1px solid #2e2e2e; margin-bottom: 10px;
    }
    .panel-global {
      padding: 10px 10px 11px;
      background: linear-gradient(180deg, #2a2a2a 0%, #242424 100%);
      border: 1px solid #3a3a3a; border-radius: 10px;
    }
    .panel-zone-label {
      display: flex; align-items: baseline; justify-content: space-between; gap: 8px;
      font-size: 10px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase;
      color: #777; margin-bottom: 7px;
    }
    .panel-zone-hint {
      font-weight: 400; text-transform: none; letter-spacing: 0; color: #555; font-size: 10px;
    }
    .panel-head {
      display: flex; flex-direction: column; gap: 0;
    }
    .config-toolbar {
      display: flex; flex-direction: column; gap: 6px;
      padding: 0; background: transparent; border: none; border-radius: 0; box-shadow: none;
    }
    .config-toolbar-row {
      display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
    }
    .cfg-btn {
      width: 100%; padding: 7px 8px; font-size: 12px; font-weight: 500; line-height: 1.2;
      border-radius: 7px; border: 1px solid transparent; cursor: pointer;
      transition: background .15s, border-color .15s, color .15s, box-shadow .15s;
    }
    .cfg-btn:hover { filter: none; }
    .cfg-btn-primary {
      background: linear-gradient(180deg, #3a7de6 0%, #2d6cdf 100%);
      color: #fff; box-shadow: 0 1px 0 rgba(255, 255, 255, 0.12) inset;
    }
    .cfg-btn-primary:hover { background: linear-gradient(180deg, #4a8af0 0%, #3578e8 100%); }
    .cfg-btn-ghost {
      background: #333; border-color: #454545; color: #d0d0d0;
    }
    .cfg-btn-ghost:hover { background: #3a3a3a; border-color: #555; color: #fff; }
    .cfg-btn-danger {
      background: rgba(120, 40, 40, 0.12); border-color: #5a3030; color: #e09090;
    }
    .cfg-btn-danger:hover {
      background: rgba(139, 46, 46, 0.28); border-color: #8b4040; color: #ffc0c0;
    }
    .cfg-btn-label { display: block; font-size: 12px; }
    .cfg-btn-sub { display: block; font-size: 10px; opacity: 0.72; font-weight: 400; margin-top: 1px; }
    h1 { font-size: 16px; font-weight: 600; }
    h2 { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
    label { font-size: 13px; display: flex; flex-direction: column; gap: 4px; }
    input[type=range] { width: 100%; }
    select { background: #252525; border: 1px solid #444; color: #eee; padding: 6px 8px; border-radius: 4px; font-size: 13px; }
    button {
      background: #2d6cdf; border: none; color: #fff; padding: 8px 12px;
      border-radius: 6px; cursor: pointer; font-size: 13px; width: 100%;
    }
    button.secondary { background: #333; }
    button.secondary.active { background: #2d6cdf; }
    button.danger { background: #8b2e2e; }
    button:hover { filter: brightness(1.1); }
    .row { display: flex; gap: 8px; }
    .row.gizmo-row { margin-bottom: 4px; }
    .row button { flex: 1; }
    .hint { font-size: 12px; color: #888; line-height: 1.5; }
    .status { font-size: 12px; color: #6cf; min-height: 18px; word-break: break-all; line-height: 1.45; }
    .val { color: #aaa; font-size: 11px; }
    .val-editable { cursor: pointer; border-bottom: 1px dotted #666; }
    .val-editable:hover { color: #ddd; border-bottom-color: #6cf; }
    .val-inline-input {
      width: 72px; background: #252525; border: 1px solid #6cf; color: #eee;
      padding: 1px 4px; border-radius: 3px; font-size: 11px;
    }
    .path-transport { margin-top: 6px; }
    .path-transport button { flex: 1; font-size: 12px; padding: 6px 8px; }
    .path-transport button.active { background: #2d6cdf; }
    .render-actions { display: flex; flex-direction: column; gap: 6px; margin-top: 6px; }
    #loadProgressWrap[hidden] { display: none !important; }
    #loadProgressBar { height: 5px; background: #2a2a2a; border-radius: 3px; overflow: hidden; }
    #loadProgressFill { height: 100%; width: 0%; background: linear-gradient(90deg, #2d6cdf, #6cf); transition: width .12s; }
    #loadProgressText { font-size: 11px; color: #888; margin-top: 4px; }
    .scene-list { display: flex; flex-direction: column; gap: 4px; max-height: 280px; overflow-y: auto; }
    .scene-row {
      display: flex; align-items: center; gap: 6px; padding: 6px 8px; border-radius: 6px;
      background: #222; border: 1px solid #333; font-size: 12px; cursor: pointer;
    }
    .scene-row:hover { background: #2a2a2a; }
    .scene-row.active { background: #1e2a40; border-color: #2d6cdf; }
    .scene-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .icon-btn {
      width: 24px; height: 24px; padding: 0; border-radius: 4px; background: transparent;
      border: 1px solid #444; color: #bbb; font-size: 12px; flex-shrink: 0;
    }
    .icon-btn:hover { background: #333; color: #fff; }
    #pickFile { display: none; }
    input[type=number] {
      background: #252525; border: 1px solid #444; color: #eee;
      padding: 5px 8px; border-radius: 4px; font-size: 12px; width: 100%;
    }
    .cam-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
    .cam-grid label { font-size: 11px; }
    #rigPreviewFloat {
      position: absolute; left: 12px; bottom: 12px; width: 336px; z-index: 4;
      background: rgba(18, 18, 18, 0.94); border: 1px solid #444; border-radius: 8px;
      overflow: hidden; box-shadow: 0 6px 24px rgba(0, 0, 0, 0.45); pointer-events: none;
    }
    #rigPreviewFloat[hidden] { display: none !important; }
    #rigPreviewFloat header {
      padding: 6px 10px; font-size: 12px; color: #ccc; border-bottom: 1px solid #333;
      display: flex; justify-content: space-between; align-items: center;
    }
    #rigPreviewCanvas, #rigPreviewVideo {
      width: 100%; display: block; aspect-ratio: 16 / 9;
      background: repeating-conic-gradient(#2a2a2a 0% 25%, #222 0% 50%) 50% / 16px 16px;
    }
    #rigPreviewVideo[hidden] { display: none !important; }
    #rigPreviewCanvas[hidden] { display: none !important; }
    .marker-list { display: flex; flex-direction: column; gap: 4px; max-height: 160px; overflow-y: auto; }
    .marker-row {
      display: flex; align-items: center; gap: 6px; padding: 5px 8px; border-radius: 6px;
      background: #222; border: 1px solid #333; font-size: 11px; cursor: pointer;
    }
    .marker-row:hover { background: #2a2a2a; }
    .marker-row.active { border-color: #2d6cdf; background: #1e2a40; }
    .marker-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .marker-dot.start { background: #6a6; }
    .marker-dot.mid { background: #888; }
    .marker-dot.end { background: #a66; }
    .marker-dot.node { background: #7aa; }
    .pose-seq-header {
      display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-top: 8px;
    }
    .pose-seq-header h2 { margin: 0; }
    .pose-add-btn { flex-shrink: 0; padding: 6px 10px; font-size: 11px; white-space: nowrap; }
    .curve-edit-bar {
      display: flex; align-items: center; gap: 8px; margin-top: 6px; padding: 8px 10px;
      border-radius: 8px; background: rgba(255, 235, 120, 0.14); border: 1px solid rgba(255, 214, 80, 0.45);
    }
    .curve-edit-bar .curve-dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
      background: #ff0066; box-shadow: 0 0 0 2px #111, 0 0 6px rgba(255, 0, 102, 0.6);
    }
    .curve-edit-bar .curve-edit-label { font-size: 11px; color: #e8d878; font-weight: 600; }
    .curve-edit-bar button { padding: 5px 10px; font-size: 11px; }
    .curve-edit-bar .curve-edit-actions { display: flex; gap: 6px; margin-left: auto; }
    .rig-pose-controls { display: flex; flex-direction: column; gap: 8px; transition: opacity 0.15s; }
    .rig-pose-controls.dimmed { opacity: 0.38; pointer-events: none; }
    .drag-handle { cursor: grab; color: #666; font-size: 14px; line-height: 1; user-select: none; flex-shrink: 0; }
    .marker-row.drag-over { border-color: #6cf; }
    .marker-row.dragging { opacity: 0.55; }
    .panel-nav {
      margin-bottom: 12px;
    }
    .panel-tabs {
      display: grid; grid-template-columns: 1fr 1fr; gap: 0; padding: 3px;
      background: #111; border: 1px solid #333; border-radius: 9px;
    }
    .panel-tab {
      width: auto; background: transparent; border: none; color: #888;
      padding: 8px 10px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500;
      position: relative; transition: color .15s, background .15s, box-shadow .15s;
    }
    .panel-tab:hover { filter: none; color: #bbb; background: rgba(255, 255, 255, 0.03); }
    .panel-tab.active {
      background: #222; color: #eee;
      box-shadow: inset 0 0 0 1px #3d3d3d, 0 1px 2px rgba(0, 0, 0, 0.35);
    }
    .panel-tab.active::after {
      content: ''; position: absolute; left: 18%; right: 18%; bottom: 5px; height: 2px;
      background: #6cf; border-radius: 2px;
    }
    .panel-body { display: flex; flex-direction: column; gap: 14px; flex: 1; min-height: 0; }
    #modelsPanel, #cameraPanel { display: flex; flex-direction: column; gap: 14px; }
    #cameraPanel[hidden], #modelsPanel[hidden] { display: none !important; }
    .path-group-row { cursor: pointer; }
    .path-group-row.active { border-color: #2d6cdf; background: #1e2a40; }
    .path-name { cursor: text; border-bottom: 1px dashed transparent; }
    .path-name:hover { border-bottom-color: #666; }
    .path-rename-input {
      flex: 1; min-width: 0; background: #111; border: 1px solid #2d6cdf; color: #eee;
      padding: 2px 6px; border-radius: 4px; font-size: 11px;
    }
    .panel-config-note { font-size: 11px; color: #666; line-height: 1.4; margin-top: -6px; }
    button.secondary.active { background: #2d6cdf; }
    button.secondary:not(.active) { background: #333; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/",
      "@mkkellogg/gaussian-splats-3d": "./vendor/gaussian-splats-3d.module.js?v=20260721"
    }
  }
  </script>
  <script>
    window.addEventListener('error', (e) => {
      const s = document.getElementById('status');
      if (!s) return;
      const where = e.filename ? ` (${String(e.filename).split('/').pop()}:${e.lineno || '?'})` : '';
      const msg = `${e.message || '脚本加载失败'}${where}`;
      if (s.textContent === '初始化…' || s.textContent.startsWith('正在')) s.textContent = `错误: ${msg}`;
    });
    window.addEventListener('unhandledrejection', (e) => {
      const s = document.getElementById('status');
      if (!s) return;
      const msg = (e.reason && e.reason.message) || String(e.reason || '未知错误');
      if (s.textContent === '初始化…' || s.textContent.startsWith('正在')) s.textContent = `错误: ${msg}`;
    });
  </script>
</head>
<body>
  <div id="view">
    <div id="viewMain"></div>
    <div id="viewHelper"></div>
    <div id="rigPreviewFloat" hidden>
      <header><span id="rigPreviewTitle">高斯渲染预览</span><span class="val" id="rigPreviewStatus">未渲染</span></header>
      <canvas id="rigPreviewCanvas"></canvas>
      <video id="rigPreviewVideo" hidden playsinline loop muted></video>
    </div>
  </div>
  <div id="panel">
    <header class="panel-chrome">
      <div class="status" id="status">初始化…</div>
      <section class="panel-global">
        <div class="panel-zone-label">
          <span>场景配置</span>
          <span class="panel-zone-hint">全局 · 随时可用</span>
        </div>
        <div class="config-toolbar">
          <button type="button" id="saveBtn" class="cfg-btn cfg-btn-primary" title="保存到浏览器或 placements.json">
            <span class="cfg-btn-label">保存</span>
            <span class="cfg-btn-sub">配置 + 模型缓存</span>
          </button>
          <div class="config-toolbar-row">
            <button type="button" id="importJsonBtn" class="cfg-btn cfg-btn-ghost" title="从 JSON 文件恢复">
              <span class="cfg-btn-label">导入 JSON</span>
            </button>
            <button type="button" id="exportJsonBtn" class="cfg-btn cfg-btn-ghost" title="下载完整 JSON 配置">
              <span class="cfg-btn-label">导出 JSON</span>
            </button>
          </div>
          <button type="button" id="clearBtn" class="cfg-btn cfg-btn-danger" title="清空场景与浏览器缓存">
            <span class="cfg-btn-label">清空</span>
            <span class="cfg-btn-sub">重置场景</span>
          </button>
        </div>
      </section>
    </header>
    <div id="loadProgressWrap" hidden>
      <div id="loadProgressBar"><div id="loadProgressFill"></div></div>
      <div id="loadProgressText"></div>
    </div>

    <nav class="panel-nav" aria-label="工作区">
      <div class="panel-zone-label">
        <span>工作区</span>
        <span class="panel-zone-hint">分页切换</span>
      </div>
      <div class="panel-tabs" role="tablist">
        <button type="button" id="tabModelsBtn" class="panel-tab active" role="tab" aria-selected="true">模型</button>
        <button type="button" id="tabCameraBtn" class="panel-tab" role="tab" aria-selected="false">相机</button>
      </div>
    </nav>

    <div class="panel-body">
    <div id="modelsPanel">
      <section>
        <h2>导入模型</h2>
        <input type="file" id="pickFile" accept=".ply" multiple />
        <button type="button" id="importBtn" class="secondary">选择 PLY 文件</button>
      </section>
      <section>
        <h2>已放置</h2>
        <div id="sceneList" class="scene-list"></div>
      </section>
      <section>
        <h2>默认参数</h2>
        <label>比例 <span class="val" id="scaleVal">0.12</span>
          <input type="range" id="defaultScale" min="0.01" max="0.5" step="0.005" value="0.12" />
        </label>
        <label>落地高度 Z <span class="val" id="zVal">0.0006</span>
          <input type="range" id="defaultZ" min="-0.002" max="0.003" step="0.0001" value="0.0006" />
        </label>
        <p class="hint">新导入模型默认使用此比例与高度</p>
      </section>
      <section>
        <h2>选中项</h2>
        <p class="hint" id="selHint">从列表选中模型</p>
        <div class="row gizmo-row">
          <button type="button" id="gizmoMove" class="secondary">移动 Q</button>
          <button type="button" id="gizmoRotate" class="secondary">旋转 W</button>
        </div>
        <label>位置 X <span class="val" id="selXVal">—</span><input type="range" id="selX" min="-1" max="1" step="0.005" disabled /></label>
        <label>位置 Y <span class="val" id="selYVal">—</span><input type="range" id="selY" min="-0.45" max="0.45" step="0.005" disabled /></label>
        <label>高度 Z <span class="val" id="selZVal">—</span><input type="range" id="selZ" min="-0.002" max="0.003" step="0.0001" disabled /></label>
        <label>比例 <span class="val" id="selScaleVal">—</span><input type="range" id="selScale" min="0.01" max="0.5" step="0.005" disabled /></label>
        <label>旋转° <span class="val" id="selYawVal">—</span><input type="range" id="selYaw" min="-180" max="180" step="1" disabled /></label>
        <p class="hint">默认无 Gizmo；点击按钮启用，再点一次关闭，防误触</p>
      </section>
      <section>
        <h2>视图</h2>
        <label>背景色
          <select id="viewBgSelect">
            <option value="cream" selected>米白色</option>
            <option value="black">黑色</option>
          </select>
        </label>
      </section>
      <button type="button" id="mergeBtn" class="secondary">合并完整 scene.ply</button>
      <p class="hint" id="mergeHint">合并时从 outputs/ 读取完整模型（需本地 python serve_editor.py）</p>
    </div>

    <div id="cameraPanel" hidden>
      <section>
        <h2>渲染摄像机</h2>
        <button type="button" id="toggleRigBtn" class="secondary">打开渲染摄像机</button>
      </section>
      <section id="rigPanel" hidden>
        <h2>轨迹组</h2>
        <div id="pathGroupList" class="marker-list"></div>
        <div class="row">
          <button type="button" id="addPathGroupBtn" class="secondary">新建轨迹</button>
          <button type="button" id="deletePathGroupBtn" class="secondary danger">删除轨迹</button>
        </div>
        <div class="pose-seq-header">
          <h2>机位序列</h2>
          <button type="button" id="addMarkerBtn" class="secondary pose-add-btn">＋ 当前机位</button>
        </div>
        <div class="row path-transport" id="pathTransportRow" hidden>
          <button type="button" id="pathPlayBtn" class="secondary" title="沿轨迹播放">▶ 播放</button>
          <button type="button" id="pathPauseBtn" class="secondary" title="暂停后可移动机位">⏸ 暂停</button>
        </div>
        <div id="markerList" class="marker-list"></div>
        <div id="keypointEditRow" class="curve-edit-bar" hidden>
          <span class="curve-dot"></span>
          <span class="curve-edit-label">轨迹弯折</span>
          <div class="curve-edit-actions">
            <button type="button" id="confirmKeypointBtn">完成</button>
            <button type="button" id="deleteKeypointBtn" class="secondary danger">删除</button>
          </div>
        </div>
        <p id="pathSlideStatus" class="hint" style="color:#2a8f6a;font-weight:600" hidden>路径预览：待机</p>
        <div id="pathPinSection" hidden>
          <label>路径位置 <span class="val" id="pathPinTVal">0%</span>
            <input type="range" id="pathPinT" min="0" max="100" step="0.1" value="0" />
          </label>
          <p class="hint">暂停后拖路径位置条移动机位；点击轨迹添加弯折点</p>
        </div>
        <h2 style="margin-top:8px">默认参数</h2>
        <label>每段帧数 <span class="val" id="pathFramesVal">16</span>
          <input type="range" id="pathFrames" min="8" max="48" step="1" value="16" />
        </label>
        <label>播放 FPS <span class="val" id="pathFpsVal">12</span>
          <input type="range" id="pathFps" min="6" max="30" step="1" value="12" />
        </label>
        <p class="hint" id="rigCameraHint">与模型相同的世界坐标；移动/旋转选中模型时，相机与轨迹会一起变换</p>
        <h2 style="margin-top:4px">机位</h2>
        <div id="rigPoseControls" class="rig-pose-controls">
        <div class="row gizmo-row">
          <button type="button" id="gizmoMoveRig" class="secondary">移动 Q</button>
          <button type="button" id="gizmoRotateRig" class="secondary">旋转 W</button>
        </div>
        <label>机位 X <span class="val" id="rigXVal">—</span><input type="range" id="rigX" min="-1" max="1" step="0.005" disabled /></label>
        <label>机位 Y <span class="val" id="rigYVal">—</span><input type="range" id="rigY" min="-0.45" max="0.45" step="0.005" disabled /></label>
        <label>机位 Z <span class="val" id="rigZVal">—</span><input type="range" id="rigZ" min="-0.05" max="0.5" step="0.005" disabled /></label>
        <label>偏航° <span class="hint">(绕Z)</span> <span class="val" id="rigYawVal">0</span>
          <input type="range" id="rigYaw" min="-180" max="180" step="1" value="0" disabled />
        </label>
        <label>俯仰° <span class="hint">(绕X)</span> <span class="val" id="rigPitchVal">0</span>
          <input type="range" id="rigPitch" min="-89" max="89" step="1" value="0" disabled />
        </label>
        <label>翻滚° <span class="hint">(绕Y)</span> <span class="val" id="rigRollVal">0</span>
          <input type="range" id="rigRoll" min="-180" max="180" step="1" value="0" disabled />
        </label>
        </div>
        <label>视野 FOV° <span class="val" id="rigFovVal">50</span>
          <input type="range" id="rigFov" min="20" max="90" step="1" value="50" />
        </label>
        <label>近平面 <span class="val" id="rigNearVal">0.01</span>
          <input type="range" id="rigNear" min="0.001" max="0.5" step="0.001" value="0.01" />
        </label>

    }

    function startPathRename(pathId, anchorEl) {
      const path = cameraPaths.find((p) => p.id === pathId);
      if (!path || !(anchorEl && anchorEl.replaceWith)) return;
      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'path-rename-input';
      input.value = path.name;
      input.onclick = (e) => e.stopPropagation();
      const commit = () => {
        const v = input.value.trim();
        if (v) path.name = v;
        renderPathGroupList();
      };
      input.onkeydown = (e) => {
        if (e.key === 'Enter') { e.preventDefault(); commit(); }
        if (e.key === 'Escape') renderPathGroupList();
      };
      input.onblur = commit;
      anchorEl.replaceWith(input);
      input.focus();
      input.select();
    }

    function addCameraPathGroup() {
      syncActivePathFromState();
      const path = createEmptyCameraPath();
      cameraPaths.push(path);
      activePathId = path.id;
      loadActivePathToState();
      setupPathVisuals();
      renderMarkerList();
      renderPathGroupList();
      stopPathSlidePreview();
      el('rigPreviewStatus').textContent = '需重新渲染';
      status(`已创建 ${path.name}`);
    }

    function deleteCameraPathGroup() {
      syncActivePathFromState();
      const idx = cameraPaths.findIndex((p) => p.id === activePathId);
      if (idx < 0) return;
      cameraPaths.splice(idx, 1);
      if (cameraPaths.length) {
        activePathId = cameraPaths[Math.max(0, idx - 1)].id;
        loadActivePathToState();
        setupPathVisuals();
      } else {
        activePathId = null;
        cameraMarkers = [];
        cameraPathSegments = [];
        selectedMarkerIdx = -1;
        selectedCpSegIdx = -1;
        selectedCpPointIdx = -1;
        clearPathVisuals();
      }
      renderMarkerList();
      renderPathGroupList();
      attachGizmo();
      updateKeypointEditUI();
      if (cameraMarkers.length >= 2) resumePathSlideIfPlaying();
      else stopPathSlidePreview();
      el('rigPreviewStatus').textContent = '需重新渲染';
      status(cameraPaths.length ? '已删除轨迹' : '已清空全部轨迹');
    }

    function switchPanelTab(tab) {
      const showModels = tab === 'models';
      el('modelsPanel').hidden = !showModels;
      el('cameraPanel').hidden = showModels;
      el('tabModelsBtn').classList.toggle('active', showModels);
      el('tabCameraBtn').classList.toggle('active', !showModels);
      el('tabModelsBtn').setAttribute('aria-selected', showModels ? 'true' : 'false');
      el('tabCameraBtn').setAttribute('aria-selected', showModels ? 'false' : 'true');
    }

    function getRenderCameraPoseJson() {
      if (!renderCameraPose) return null;
      return {
        x: renderCameraPose.x,
        y: renderCameraPose.y,
        z: renderCameraPose.z,
        yaw_deg: renderCameraPose.yaw_deg,
        pitch_deg: renderCameraPose.pitch_deg,
        roll_deg: renderCameraPose.roll_deg,
      };
    }

    function applyRenderCameraPose(rc) {
      if (!rc || !renderCameraPose) return;
      renderCameraPose.x = _n(rc.x, renderCameraPose.x);
      renderCameraPose.y = _n(rc.y, renderCameraPose.y);
      renderCameraPose.z = _n(rc.z, renderCameraPose.z);
      renderCameraPose.yaw_deg = _n(rc.yaw_deg, renderCameraPose.yaw_deg);
      renderCameraPose.pitch_deg = _n(rc.pitch_deg, renderCameraPose.pitch_deg);
      renderCameraPose.roll_deg = _n(rc.roll_deg, renderCameraPose.roll_deg);
      if (renderCamRig) syncRigFromPose();
    }

    function getRenderSettings() {
      return {
        fov: parseFloat(el('rigFov').value),
        near: parseFloat(el('rigNear').value),
        far: parseFloat(el('rigFar').value),
        width: parseInt(el('renderWidth').value, 10),
        height: parseInt(el('renderHeight').value, 10),
        showFrustum: el('showFrustum').checked,
      };
    }

    function applyRenderSettings(rs) {
      if (!rs) return;
      if (rs.fov != null) { el('rigFov').value = rs.fov; el('rigFovVal').textContent = rs.fov; }
      if (rs.near != null) { el('rigNear').value = rs.near; el('rigNearVal').textContent = rs.near; }
      if (rs.far != null) { el('rigFar').value = rs.far; el('rigFarVal').textContent = rs.far; }
      if (rs.width != null) el('renderWidth').value = rs.width;
      if (rs.height != null) el('renderHeight').value = rs.height;
      if (rs.showFrustum != null) el('showFrustum').checked = rs.showFrustum;
      syncRenderCameraParams();
    }

    async function fetchWithTimeout(url, options = {}, ms = 4000) {
      const ctrl = new AbortController();
      const timer = setTimeout(() => ctrl.abort(), ms);
      try {
        return await fetch(url, { ...options, signal: ctrl.signal });
      } finally {
        clearTimeout(timer);
      }
    }

    async function detectHostMode() {
      if (location.protocol === 'file:') return 'static';
      try {
        const res = await fetchWithTimeout(apiUrl('api/health'), { cache: 'no-store' });
        if (!res.ok) return 'static';
        const data = await res.json();
        if (data && data.ok && data.configVersion >= 2) return 'server';
      } catch (_) {}
      return 'static';
    }

    function updateHostModeUI() {
      const mergeBtn = el('mergeBtn');
      const mergeHint = el('mergeHint');
      const saveBtn = el('saveBtn');
      if (hostMode === 'server') {
        if (mergeBtn) mergeBtn.disabled = false;
        if (mergeHint) mergeHint.textContent = '合并时从 outputs/ 读取完整模型（非 50% 轻量版）';
        if (saveBtn) saveBtn.title = '保存到 placements.json（模型+相机）';
      } else {
        if (mergeBtn) mergeBtn.disabled = true;
        if (mergeHint) mergeHint.textContent = '在线版不可用 · 本地运行 python serve_editor.py 后可合并';
        if (saveBtn) saveBtn.title = '保存到浏览器（含模型缓存，换机请用导出 JSON）';
      }
    }

    async function loadSavedConfig() {
      if (hostMode === 'server') {
        try {
          const res = await fetchWithTimeout(apiUrl('api/placements'));
          if (!res.ok) return parseSavedConfig([]);
          return parseSavedConfig(await res.json());
        } catch (_) {
          return parseSavedConfig([]);
        }
      }
      const raw = localStorage.getItem(CONFIG_STORAGE_KEY);
      if (!raw) return parseSavedConfig([]);
      try {
        return parseSavedConfig(JSON.parse(raw));
      } catch (_) {
        return parseSavedConfig([]);
      }
    }

    async function importConfigFromFile(file) {
      const text = await file.text();
      const cfg = parseSavedConfig(JSON.parse(text));
      applyConfigMeta(cfg);
      for (let i = placements.length - 1; i >= 0; i--) removePlacement(i);
      await preloadAssetsForConfig(cfg, sessionResetToken);
      if (isSessionAborted(sessionResetToken)) return;
      const savedPlacements = placementsFromConfig(cfg);
      if (savedPlacements.length) await restorePlacements(savedPlacements, sessionResetToken);
      if (isSessionAborted(sessionResetToken)) return;
      restoreCameraPaths(cfg.cameraPaths, cfg.activePathId, cfg.renderSettings, cfg.renderCamera);
      restoreRigUiState(cfg);
      if (hostMode === 'static') {
        await idbPutAllFromCache();
        localStorage.setItem(CONFIG_STORAGE_KEY, JSON.stringify(configToJson()));
      }
      status(`已导入 · ${placements.length} 模型 · ${cameraPaths.length} 轨迹`);
    }

    function placementsFromConfig(cfg) {
      return [...(cfg.placements || [])];
    }

    function emptyConfigJson() {
      return {
        version: 2,
        defaults: {
          scale: defaultScale,
          z: defaultZ,
        },
        view: {
          background: viewBgMode,
          rigOpen: false,
        },
        placements: [],
        cameraPaths: [],
        activePathId: null,
        renderSettings: getRenderSettings(),
        renderCamera: getRenderCameraPoseJson(),
      };
    }

    function parseSavedConfig(saved) {
      if (Array.isArray(saved)) {
        return {
          version: 1,
          placements: saved,
          cameraPaths: null,
          activePathId: null,
          renderSettings: null,
          renderCamera: null,
          defaults: null,
          view: null,
        };
      }
      if (saved && typeof saved === 'object' && saved.version >= 2) {
        return {
          version: saved.version,
          placements: saved.placements || [],
          cameraPaths: saved.cameraPaths || [],
          activePathId: saved.activePathId || null,
          renderSettings: saved.renderSettings || null,
          renderCamera: saved.renderCamera || null,
          defaults: saved.defaults || null,
          view: saved.view || null,
        };
      }
      return {
        version: 0,
        placements: [],
        cameraPaths: null,
        activePathId: null,
        renderSettings: null,
        renderCamera: null,
        defaults: null,
        view: null,
      };
    }

    function applyConfigMeta(cfg) {
      if (!cfg) return;
      if (cfg.defaults) {
        if (cfg.defaults.scale != null) {
          defaultScale = cfg.defaults.scale;
          el('defaultScale').value = defaultScale;
          el('scaleVal').textContent = defaultScale.toFixed(2);
        }
        if (cfg.defaults.z != null) {
          defaultZ = cfg.defaults.z;
          el('defaultZ').value = defaultZ;
          el('zVal').textContent = defaultZ.toFixed(4);
        }
      }
      if (cfg.view && cfg.view.background) applyViewBackground(cfg.view.background);
    }

    function restoreRigUiState(cfg) {
      if (cfg && cfg.view && cfg.view.rigOpen && cameraPaths.length) openRigCamera();
    }

    function restoreCameraPaths(paths, activeId, renderSettings, renderCamera) {
      if (paths && paths.length) {
        cameraPaths = paths.map((p) => ({
          id: p.id || `path-${nextPathId++}`,
          name: p.name || '轨迹',
          markers: (p.markers || []).map((m) => normalizeMarkerPose(m)),
          segments: (p.segments || []).map((s) => ({
            points: (s.points || []).map((pt) => ({ x: pt.x, y: pt.y, z: pt.z, t: pt.t })),
          })),
          framesPerSeg: _n(p.framesPerSeg, 16),
          fps: _n(p.fps, 12),
        }));
        for (const p of cameraPaths) {
          const m = /^path-(\d+)$/.exec(p.id);
          if (m) nextPathId = Math.max(nextPathId, parseInt(m[1], 10) + 1);
        }
        activePathId = activeId && cameraPaths.some((p) => p.id === activeId)
          ? activeId
          : cameraPaths[0].id;
      } else {
        cameraPaths = [];
        activePathId = null;
      }
      applyRenderSettings(renderSettings);
      applyRenderCameraPose(renderCamera);
      loadActivePathToState();
      renderPathGroupList();
      renderMarkerList();
    }

    function reorderMarkers(fromIdx, toIdx) {
      if (fromIdx === toIdx || fromIdx < 0 || toIdx < 0) return;
      const [m] = cameraMarkers.splice(fromIdx, 1);
      cameraMarkers.splice(toIdx, 0, m);
      cameraPathSegments = [];
      rebuildPathSegments();
      if (selectedMarkerIdx === fromIdx) selectedMarkerIdx = toIdx;
      else if (fromIdx < selectedMarkerIdx && toIdx >= selectedMarkerIdx) selectedMarkerIdx--;
      else if (fromIdx > selectedMarkerIdx && toIdx <= selectedMarkerIdx) selectedMarkerIdx++;
      selectedCpSegIdx = -1;
      selectedCpPointIdx = -1;
      setupPathVisuals();
      renderMarkerList();
      syncActivePathFromState();
      renderPathGroupList();
      el('rigPreviewStatus').textContent = '需重新渲染';
      if (cameraMarkers.length >= 2) resumePathSlideIfPlaying();
      else stopPathSlidePreview();
      status('机位顺序已更新');
    }

    function pathEndpointDistance() {
      if (cameraMarkers.length < 2) return 0;
      const a = cameraMarkers[0];
      const b = cameraMarkers[cameraMarkers.length - 1];
      return Math.hypot(b.x - a.x, b.y - a.y, b.z - a.z);
    }

    function applyAlwaysOnTop(root) {
      if (!root) return;
      root.traverse((o) => {
        if (o.renderOrder == null || o.renderOrder < 1000) o.renderOrder = 1000;
        if (!o.material) return;
        const mats = Array.isArray(o.material) ? o.material : [o.material];
        for (const m of mats) {
          m.depthTest = false;
          m.depthWrite = false;
          if (m.opacity !== undefined && m.opacity < 1) m.transparent = true;
        }
      });
    }

    /** 轨迹管在底层，弯折关键点在最上层，避免白芯轨迹盖住球体 */
    function refreshPathRenderOrder() {
      if (pathTubeGroup) {
        pathTubeGroup.traverse((o) => {
          if (!o.material) return;
          const op = o.material.opacity;
          if (op === 0) o.renderOrder = 1005;
          else if (o.material.color && o.material.color.getHex && o.material.color.getHex() === 0xffffff) o.renderOrder = 1010;
          else o.renderOrder = 1008;
        });
      }
      if (pathLine) pathLine.renderOrder = 1012;
      markerMeshes.forEach((m) => { m.renderOrder = 1018; });
      cpMeshes.forEach((g) => {
        g.renderOrder = 1030;
        g.children.forEach((c, i) => { c.renderOrder = 1031 + i; });
      });
    }

    function styleCameraHelperOnTop() {
      if (!cameraHelper) return;
      applyAlwaysOnTop(cameraHelper);
      if (!Array.isArray(cameraHelper.material) && cameraHelper.material) {
        cameraHelper.material.color.setHex(0xff6600);
      }
    }

    function initRigOverlayScene() {
      if (!viewer || rigOverlayScene) return;
      rigOverlayScene = new THREE.Scene();
      rigOverlayScene.name = 'RigOverlayScene';
      if (viewer._rigOverlayPatched) return;
      viewer._rigOverlayPatched = true;
      const origRender = viewer.render.bind(viewer);
      viewer._origGaussianRender = origRender;
      viewer.render = function () {
        origRender();
        renderRigOverlayPass();
      };
    }

    function renderRigOverlayPass() {
      if (!(viewer && viewer.initialized) || !rigOverlayScene || !viewer.camera) return;
      if (viewer.isDisposingOrDisposed && viewer.isDisposingOrDisposed()) return;
      syncCameraHelper();
      const renderer = viewer.renderer;
      if (!renderer) return;
      const savedAutoClear = renderer.autoClear;
      renderer.autoClear = false;
      renderer.render(rigOverlayScene, viewer.camera);
      renderer.autoClear = savedAutoClear;
    }

    function setPathSlideBeaconVisible(on) {
      if (pathSlideBeacon) pathSlideBeacon.visible = !!on;
    }

    function updatePathSlideStatus(text, show = true) {
      const node = el('pathSlideStatus');
      if (!node) return;
      node.hidden = !show;
      if (show) node.textContent = text;
    }

    function isPathSlideBlocked() {
      if (transformControls && transformControls.dragging) return true;
      if (markerGizmoMode) return true;
      if (rigGizmoMode) return true;
      return false;
    }

    function globalTFromSegmentHit(segIdx, localT) {
      const segs = cameraMarkers.length - 1;
      if (segs <= 0) return 0;
      return (segIdx + localT) / segs;
    }

    function applyPathPinAtGlobalT(globalT) {
      pathPinT = Math.max(0, Math.min(1, globalT));
      el('pathPinT').value = pathPinT * 100;
      el('pathPinTVal').textContent = `${(pathPinT * 100).toFixed(1)}%`;
      applyPathPinPosition();
    }

    function syncPathPinFromCamera() {
      if (cameraMarkers.length < 2 || !renderCamRig) return;
      let bestT = pathPinT;
      let bestD = Infinity;
      const px = renderCamRig.position.x;
      const py = renderCamRig.position.y;
      const pz = renderCamRig.position.z;
      for (let i = 0; i <= 200; i++) {
        const t = i / 200;
        const s = samplePathAt(t);
        if (!s) continue;
        const dx = s.position.x - px;
        const dy = s.position.y - py;
        const dz = s.position.z - pz;
        const d = dx * dx + dy * dy + dz * dz;
        if (d < bestD) {
          bestD = d;
          bestT = t;
        }
      }
      pathPinT = bestT;
      el('pathPinT').value = pathPinT * 100;
      el('pathPinTVal').textContent = `${(pathPinT * 100).toFixed(1)}%`;
    }

    function updatePathTransportUI() {
      const hasPath = cameraMarkers.length >= 2;
      el('pathTransportRow').hidden = !hasPath;
      el('pathPinSection').hidden = !hasPath;
      el('renderExportSequenceBtn').disabled = !hasPath;
      el('renderPathVideoBtn').disabled = !hasPath;
      if (el('pathPlayBtn')) {
        el('pathPlayBtn').disabled = !hasPath || pathSlidePlaying;
        el('pathPlayBtn').classList.toggle('active', pathSlidePlaying);
      }
      if (el('pathPauseBtn')) {
        el('pathPauseBtn').disabled = !hasPath || !pathSlidePlaying;
        el('pathPauseBtn').classList.toggle('active', hasPath && !pathSlidePlaying);
      }
      if (!hasPath) {
        pathSlidePlaying = false;
        stopPathSlidePreview();
      }
    }

    function pausePathSlide() {
      if (cameraMarkers.length < 2) return;
      stopPathSlidePreview();
      pathSlidePlaying = false;
      syncPathPinFromCamera();
      updatePathTransportUI();
      updatePathSlideStatus('路径预览：已暂停 · 拖路径位置条移动机位', true);
    }

    function playPathSlide() {
      if (cameraMarkers.length < 2 || !rigOpen) return;
      markerGizmoMode = null;
      rigGizmoMode = null;
      selectedCpSegIdx = -1;
      selectedCpPointIdx = -1;
      updateKeypointEditUI();
      el('gizmoMoveRig').classList.remove('active');
      el('gizmoRotateRig').classList.remove('active');
      transformControls && transformControls.detach();
      if (transformControls && transformControls.dragging) {
        status('请先松开 Gizmo 再播放');
        return;
      }
      pathSlidePlaying = true;
      pathSlidePhase = Math.asin(Math.max(-1, Math.min(1, 2 * pathPinT - 1)));
      updatePathTransportUI();
      if (!startPathSlidePreview()) {
        pathSlidePlaying = false;
        updatePathTransportUI();
      }
    }

    function stopPathSlidePreview() {
      pathSlideActive = false;
      pathSlideLastTs = 0;
      pathSlideStatusTick = 0;
      if (pathSlideRaf) cancelAnimationFrame(pathSlideRaf);
      pathSlideRaf = 0;
      setPathSlideBeaconVisible(false);
      updatePathSlideStatus('', false);
    }

    function resumePathSlideIfPlaying() {
      if (pathSlidePlaying && cameraMarkers.length >= 2) {
        startPathSlidePreview();
      }
    }

    function startPathSlidePreview() {
      stopPathSlidePreview();
      if (!rigOpen || cameraMarkers.length < 2 || !renderCamRig || !pathSlidePlaying) return false;

      const span = pathEndpointDistance();
      if (span < 0.02) {
        updatePathSlideStatus(`路径预览：两机位太近（${(span * 1000).toFixed(0)}mm）`, true);
        status('两机位几乎重合，请先移动再添加');
        return false;
      }

      pathSlideActive = true;
      pathSlideLastTs = 0;
      transformControls && transformControls.detach();
      if (cameraHelper && el('showFrustum').checked) {
        cameraHelper.visible = true;
        styleCameraHelperOnTop();
      }
      setPathSlideBeaconVisible(true);
      updatePathSlideStatus('路径预览：四棱锥沿路径滑动中…', true);

      const loop = (ts) => {
        if (!pathSlideActive) return;
        pathSlideRaf = requestAnimationFrame(loop);
        tickPathSlide(ts);
      };
      pathSlideRaf = requestAnimationFrame(loop);
      return true;
    }

    function tickPathSlide(ts) {
      if (!pathSlideActive || !rigOpen || cameraMarkers.length < 2 || !renderCamRig) return;
      if (isPathSlideBlocked()) {
        pathSlideLastTs = ts;
        updatePathSlideStatus('路径预览：已暂停（关闭 Q/W 或 Gizmo 后恢复）', true);
        return;
      }
      if (!pathSlideLastTs) pathSlideLastTs = ts;
      const dt = Math.min(0.05, (ts - pathSlideLastTs) / 1000);
      pathSlideLastTs = ts;
      if (dt <= 0) return;
      pathSlidePhase += dt * PATH_SLIDE_SPEED;
      const t = (Math.sin(pathSlidePhase) + 1) * 0.5;
      pathPinT = t;
      el('pathPinT').value = t * 100;
      el('pathPinTVal').textContent = `${(t * 100).toFixed(1)}%`;
      const sample = samplePathAt(t);
      if (!sample) return;
      applySamplePoseToRig(sample);
      pathSlideStatusTick++;
      if (pathSlideStatusTick % 12 === 0) {
        const p = renderCamRig.position;
        updatePathSlideStatus(
          `路径预览：滑动中 t=${(t * 100).toFixed(0)}% · 机位 (${p.x.toFixed(2)}, ${p.y.toFixed(2)}, ${p.z.toFixed(2)})`,
          true,
        );
      }
      if (viewer && viewer.initialized) viewer.forceRenderNextFrame();
    }

    function rebuildPathSegments() {
      const newSegs = [];
      for (let i = 0; i < cameraMarkers.length - 1; i++) {
        const prev = cameraPathSegments[i];
        newSegs.push({
          points: prev && prev.points ? prev.points.map((p) => ({ x: p.x, y: p.y, z: p.z, t: p.t })) : [],
        });
      }
      cameraPathSegments = newSegs;
    }

    function ensurePathSegments() {
      if (cameraPathSegments.length === cameraMarkers.length - 1) return;
      rebuildPathSegments();
    }

    function pickPathSegment(e) {
      if (!rigOpen || cameraMarkers.length < 2) return false;
      if (!pathTubeGroup && !pathPickMeshes.length) return false;
      const rect = viewer.renderer.domElement.getBoundingClientRect();
      _pickMouse.set(
        ((e.clientX - rect.left) / rect.width) * 2 - 1,
        -((e.clientY - rect.top) / rect.height) * 2 + 1,
      );
      _pickRay.setFromCamera(_pickMouse, viewer.camera);
      pathRoot && pathRoot.updateMatrixWorld(true);
      const targets = pathPickMeshes.length ? pathPickMeshes : pathTubeGroup.children.filter((c) => c.userData.pathSegIdx != null);
      if (!targets.length) return false;
      const pathHits = _pickRay.intersectObjects(targets, false);
      const hit = pathHits.find((h) => h.object.userData.pathSegIdx != null);
      if (!hit) return false;

      const segIdx = hit.object.userData.pathSegIdx;
      const t = approximateTOnSegment(segIdx, hit.point);

      if (pathSlidePlaying) pausePathSlide();
      selectedMarkerIdx = -1;
      selected = -1;
      markerGizmoMode = null;
      rigGizmoMode = null;
      el('gizmoMoveRig').classList.remove('active');
      el('gizmoRotateRig').classList.remove('active');
      updateRigGizmoUI();
      ensurePathSegments();

      sampleSegmentLocal(segIdx, t, _tmpVec);
      const pi = addPathControlPoint(segIdx, _tmpVec.x, _tmpVec.y, _tmpVec.z, t);
      if (pi < 0) {
        status('此处已有控制点');
        return true;
      }
      selectPathCp(segIdx, pi);
      status('轨迹弯折 · Q 拖动');
      return true;
    }

    function projectTOnSegmentChord(segIdx, x, y, z) {
      const a = cameraMarkers[segIdx];
      const b = cameraMarkers[segIdx + 1];
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      const dz = b.z - a.z;
      const len2 = dx * dx + dy * dy + dz * dz;
      if (len2 < 1e-14) return 0.5;
      const t = ((x - a.x) * dx + (y - a.y) * dy + (z - a.z) * dz) / len2;
      return THREE.MathUtils.clamp(t, 0.03, 0.97);
    }

    function syncKeypointOrderAfterDrag(segIdx, pointIdx, dragObj = null) {
      const seg = cameraPathSegments[segIdx];
      const pt = seg && seg.points && seg.points[pointIdx];
      if (!pt) return pointIdx;
      const sx = pt.x;
      const sy = pt.y;
      const sz = pt.z;
      pt.t = projectTOnSegmentChord(segIdx, sx, sy, sz);
      seg.points.sort((a, b) => a.t - b.t);
      const newIdx = seg.points.findIndex(
        (p) => Math.abs(p.x - sx) < 1e-6 && Math.abs(p.y - sy) < 1e-6 && Math.abs(p.z - sz) < 1e-6,
      );
      if (selectedCpSegIdx === segIdx && selectedCpPointIdx === pointIdx) {
        selectedCpPointIdx = newIdx;
      }
      if (dragObj) dragObj.userData.cpPointIdx = newIdx;
      return newIdx;
    }

    function getSegmentWaypoints(segIdx) {
      const a = cameraMarkers[segIdx];
      const b = cameraMarkers[segIdx + 1];
      const inner = (cameraPathSegments[segIdx] && cameraPathSegments[segIdx].points || []).slice().sort((p, q) => p.t - q.t);
      return [
        new THREE.Vector3(a.x, a.y, a.z),
        ...inner.map((p) => new THREE.Vector3(p.x, p.y, p.z)),
        new THREE.Vector3(b.x, b.y, b.z),
      ];
    }

    /** 相邻路点间三次 Hermite 衔接，过每个路点且不在弦中点强制对称 */
    function buildWaypointCurvePath(waypoints) {
      const path = new THREE.CurvePath();
      const n = waypoints.length;
      if (n < 2) return path;
      if (n === 2) {
        path.add(new THREE.LineCurve3(waypoints[0], waypoints[1]));
        return path;
      }
      const tangents = new Array(n);
      for (let i = 0; i < n; i++) {
        if (i === 0) tangents[i] = waypoints[1].clone().sub(waypoints[0]);
        else if (i === n - 1) tangents[i] = waypoints[n - 1].clone().sub(waypoints[n - 2]);
        else tangents[i] = waypoints[i + 1].clone().sub(waypoints[i - 1]).multiplyScalar(0.5);
      }
      for (let i = 0; i < n - 1; i++) {
        const p0 = waypoints[i];
        const p3 = waypoints[i + 1];
        const segLen = p0.distanceTo(p3);
        if (segLen < 1e-8) continue;
        const m0 = tangents[i].clone().normalize().multiplyScalar(segLen / 3);
        const m1 = tangents[i + 1].clone().normalize().multiplyScalar(segLen / 3);
        path.add(new THREE.CubicBezierCurve3(p0, p0.clone().add(m0), p3.clone().sub(m1), p3));
      }
      return path;
    }

    function buildSegmentCurveSpec(segIdx) {
      const wps = getSegmentWaypoints(segIdx);
      if (wps.length <= 2) {
        return { straight: true, a: wps[0], b: wps[1] };
      }
      return { straight: false, curve: buildWaypointCurvePath(wps) };
    }

    function segmentCurveForTube(segIdx) {
      const spec = buildSegmentCurveSpec(segIdx);
      if (spec.straight) return new THREE.LineCurve3(spec.a, spec.b);
      return spec.curve;
    }

    function approximateTOnSegment(segIdx, worldPt, samples = 80) {
      let bestT = 0.5;
      let bestD = Infinity;
      for (let i = 0; i <= samples; i++) {
        const t = i / samples;
        sampleSegmentLocal(segIdx, t, _tmpVec);
        const d = _tmpVec.distanceToSquared(worldPt);
        if (d < bestD) {
          bestD = d;
          bestT = t;
        }
      }
      return bestT;
    }

    function findCpMesh(segIdx, pointIdx) {
      return cpMeshes.find((m) => m.userData.cpSegIdx === segIdx && m.userData.cpPointIdx === pointIdx);
    }

    function rebuildCpVisuals() {
      if (!pathRoot) return;
      for (const m of cpMeshes) {
        pathRoot.remove(m);
        m.traverse((o) => {
          if (o.geometry) o.geometry.dispose();
          if (o.material) o.material && o.material.dispose();
        });
      }
      cpMeshes = [];
      cameraPathSegments.forEach((seg, si) => {
        (seg.points || []).forEach((pt, pi) => {
          const selected = si === selectedCpSegIdx && pi === selectedCpPointIdx;
          const r = pathCpRadius();
          const group = new THREE.Group();
          group.position.set(pt.x, pt.y, pt.z);
          group.userData.cpSegIdx = si;
          group.userData.cpPointIdx = pi;
          const halo = new THREE.Mesh(
            new THREE.SphereGeometry(r * 1.18, 10, 10),
            new THREE.MeshBasicMaterial({
              color: 0x111111,
              depthTest: false,
              depthWrite: false,
            }),
          );
          const core = new THREE.Mesh(
            new THREE.SphereGeometry(r, 10, 10),
            new THREE.MeshBasicMaterial({
              color: selected ? 0xffea00 : 0xff0066,
              depthTest: false,
              depthWrite: false,
            }),
          );
          group.add(halo);
          group.add(core);
          pathRoot.add(group);
          cpMeshes.push(group);
        });
      });
      refreshPathRenderOrder();
    }

    function addPathControlPoint(segIdx, x, y, z, t) {
      ensurePathSegments();
      const seg = cameraPathSegments[segIdx];
      if (!seg) return -1;
      if (!seg.points) seg.points = [];
      if (seg.points.some((p) => Math.abs(p.t - t) < 0.025)) return -1;
      seg.points.push({ x, y, z, t });
      seg.points.sort((a, b) => a.t - b.t);
      rebuildCpVisuals();
      updatePathLine();
      el('rigPreviewStatus').textContent = '需重新渲染';
      return seg.points.findIndex((p) => Math.abs(p.t - t) < 1e-5);
    }

    function removePathControlPoint(segIdx, pointIdx) {
      const seg = cameraPathSegments[segIdx];
      if (!seg && seg.points && seg.points.length || pointIdx < 0 || pointIdx >= seg.points.length) return;

    function setupPathVisuals() {
      if (!rigOverlayScene) initRigOverlayScene();
      if (pathRoot) {
        pathRoot.parent && pathRoot.parent.remove(pathRoot);
        pathRoot.traverse((o) => {

      const mkGeo = new THREE.SphereGeometry(pathSphereRadius(), 12, 12);

    function updatePathTubes() {
      if (!pathRoot) return;
      pathPickMeshes = [];
      if (pathTubeGroup) {
        pathRoot.remove(pathTubeGroup);
        pathTubeGroup.traverse((o) => {
          if (o.geometry) o.geometry.dispose();
          if (o.material) o.material.dispose && o.material.dispose();
        });
        pathTubeGroup = null;
      }
      if (pathLine) {
        pathRoot.remove(pathLine);
        pathLine.geometry.dispose();
        pathLine.material.dispose();
        pathLine = null;
      }
      if (cameraMarkers.length < 2) return;

      pathTubeGroup = new THREE.Group();
      pathTubeGroup.name = 'PathTubes';

      for (let s = 0; s < cameraMarkers.length - 1; s++) {
        const curve = segmentCurveForTube(s);
        let tubeGeo;
        const tubeR = pathTubeRadius();
        const coreR = tubeR * 0.45;
        try {
          tubeGeo = new THREE.TubeGeometry(curve, 64, tubeR, 10, false);
        } catch (_) {
          continue;
        }
        const tube = new THREE.Mesh(
          tubeGeo,
          new THREE.MeshBasicMaterial({
            color: s === 0 && cameraMarkers.length === 2 ? 0x44ccff : 0x2288dd,
            transparent: true,
            opacity: 0.95,
            depthTest: false,
            depthWrite: false,
          }),
        );
        tube.userData.pathSegIdx = s;
        tube.renderOrder = 10;
        pathTubeGroup.add(tube);

        const core = new THREE.Mesh(
          new THREE.TubeGeometry(curve, 64, coreR, 8, false),
          new THREE.MeshBasicMaterial({
            color: 0x88ddff,
            transparent: true,
            opacity: 0.35,
            depthTest: false,
            depthWrite: false,
          }),
        );
        core.userData.pathSegIdx = s;
        core.renderOrder = 11;
        pathTubeGroup.add(core);

        const pickR = Math.max(tubeR * 2.8, 0.012);
        try {
          const pickGeo = new THREE.TubeGeometry(curve, 32, pickR, 6, false);
          const pick = new THREE.Mesh(
            pickGeo,
            new THREE.MeshBasicMaterial({
              transparent: true,
              opacity: 0,
              depthTest: false,
              depthWrite: false,
            }),
          );
          pick.userData.pathSegIdx = s;
          pick.userData.pathPick = true;
          pick.renderOrder = 9;
          pathTubeGroup.add(pick);
          pathPickMeshes.push(pick);
        } catch (_) {}
      }

      const points = [];
      for (let s = 0; s < cameraMarkers.length - 1; s++) {
        for (let j = 0; j <= 48; j++) {
          if (s > 0 && j === 0) continue;
          points.push(sampleSegmentLocal(s, j / 48, new THREE.Vector3()));
        }
      }
      pathLine = new THREE.Line(
        new THREE.BufferGeometry().setFromPoints(points),
        new THREE.LineBasicMaterial({ color: 0x88ddff, transparent: true, opacity: 1, depthTest: false }),
      );
      pathLine.renderOrder = 12;
      pathTubeGroup.add(pathLine);
      pathRoot.add(pathTubeGroup);
      refreshPathRenderOrder();
    }

    function updatePathLine() {
      updatePathTubes();
    }

    function sampleSegmentLocal(segIdx, t, outVec) {
      const spec = buildSegmentCurveSpec(segIdx);
      if (spec.straight) {
        outVec.lerpVectors(spec.a, spec.b, t);
      } else {
        spec.curve.getPoint(t, outVec);
      }
      return outVec;
    }

    function samplePathAt(globalT) {
      const segs = cameraMarkers.length - 1;
      if (segs <= 0) return null;
      const f = globalT * segs;
      const segIdx = Math.min(segs - 1, Math.floor(f));
      const localT = f - segIdx;
      sampleSegmentLocal(segIdx, localT, _tmpVecPos);
      poseQuatInto(cameraMarkers[segIdx], _tmpQuatA);
      poseQuatInto(cameraMarkers[segIdx + 1], _tmpQuatB);
      _tmpQuatOut.copy(_tmpQuatA).slerp(_tmpQuatB, localT);
      return { position: _tmpVecPos.clone(), quaternion: _tmpQuatOut.clone() };
    }

    function applyPathPinPosition() {
      if (cameraMarkers.length < 2 || !renderCamRig) return;
      const sample = samplePathAt(pathPinT);
      if (!sample) return;
      applySamplePoseToRig(sample);
      viewer && viewer.forceRenderNextFrame();
      el('rigPreviewStatus').textContent = '需重新渲染';

    function refreshPathVisuals() {

    async function renderGaussToImageData() {
      if (!(viewer && viewer.renderer) || !renderCamera) throw new Error('场景未就绪');
      if (!rigPreviewRt) rigPreviewRt = new THREE.WebGLRenderTarget(RIG_PREVIEW_W, RIG_PREVIEW_H);

      const helperWasVisible = _n(cameraHelper && cameraHelper.visible, false);
      const tcHelper = transformControls && transformControls.getHelper && transformControls.getHelper();
      const tcHelperWasVisible = _n(tcHelper && tcHelper.visible, true);
      const pathWasVisible = _n(pathRoot && pathRoot.visible, false);

      if (cameraHelper) cameraHelper.visible = false;
      if (tcHelper) tcHelper.visible = false;
      if (pathRoot) pathRoot.visible = false;

      try {
        return await withRigGaussCapture(
          RIG_PREVIEW_W,
          RIG_PREVIEW_H,
          { renderTarget: rigPreviewRt },
          ({ renderer, width, height, renderTarget }) => {
            renderer.readRenderTargetPixels(renderTarget, 0, 0, width, height, _rigPreviewBuf);
            const rowBytes = width * 4;
            for (let y = 0; y < height; y++) {
              const srcY = height - 1 - y;
              _rigPreviewImg.data.set(_rigPreviewBuf.subarray(srcY * rowBytes, srcY * rowBytes + rowBytes), y * rowBytes);
            }
            return new ImageData(new Uint8ClampedArray(_rigPreviewImg.data), width, height);
          },
        );
      } finally {
        if (cameraHelper) cameraHelper.visible = helperWasVisible;
        if (tcHelper) tcHelper.visible = tcHelperWasVisible;
        if (pathRoot) pathRoot.visible = pathWasVisible && rigOpen;
      }
    }

    async function renderPathVideoPreview() {
      if (cameraMarkers.length < 2) return renderRigPreviewFrame();
      stopPathSlidePreview();
      stopPreviewPlayback();
      const segs = cameraMarkers.length - 1;
      const totalFrames = segs * pathFramesPerSeg + 1;
      status(`渲染路径视频 0/${totalFrames}…`);
      el('rigPreviewStatus').textContent = '0%';

      const canvas = el('rigPreviewCanvas');
      canvas.width = RIG_PREVIEW_W;
      canvas.height = RIG_PREVIEW_H;
      const ctx = canvas.getContext('2d');
      previewFrames = [];
      const savedPose = { ...renderCameraPose };
      try {
        for (let f = 0; f < totalFrames; f++) {
          const sample = samplePathAt(f / (totalFrames - 1));
          applySamplePoseToRig(sample);
          syncCameraHelper();
          previewFrames.push(await renderGaussToImageData());
          if (f % 3 === 0 || f === totalFrames - 1) {
            el('rigPreviewStatus').textContent = `${Math.round((f + 1) / totalFrames * 100)}%`;
            status(`渲染路径 ${f + 1}/${totalFrames}…`);
          }
        }

        const fps = pathFps;
        const stream = canvas.captureStream(fps);
        const mime = MediaRecorder.isTypeSupported('video/webm;codecs=vp9') ? 'video/webm;codecs=vp9' : 'video/webm';
        const recorder = new MediaRecorder(stream, { mimeType: mime, videoBitsPerSecond: 4_000_000 });
        const chunks = [];
        recorder.ondataavailable = (e) => { if (e.data.size) chunks.push(e.data); };
        const done = new Promise((r) => { recorder.onstop = r; });
        recorder.start();
        for (const frame of previewFrames) {
          ctx.putImageData(frame, 0, 0);
          await new Promise((res) => setTimeout(res, 1000 / fps));
        }
        recorder.stop();
        await done;
        showPreviewVideo(URL.createObjectURL(new Blob(chunks, { type: mime })));
        el('rigPreviewStatus').textContent = '视频就绪';
        status(`路径视频 ${previewFrames.length} 帧 @ ${fps} FPS`);
      } finally {
        Object.assign(renderCameraPose, savedPose);
        syncRigFromPose();
        refreshPathVisuals();
        resumePathSlideIfPlaying();
      }
    }

    async function exportPathSequencePngs() {
      if (cameraMarkers.length < 2) throw new Error('至少需要 2 个机位才能导出路径序列');
      stopPathSlidePreview();
      stopPreviewPlayback();

      const segs = cameraMarkers.length - 1;
      const totalFrames = segs * pathFramesPerSeg + 1;
      const renderW = Math.max(1, parseInt(el('renderWidth').value, 10) || 1920);
      const renderH = Math.max(1, parseInt(el('renderHeight').value, 10) || 1080);
      const ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
      const folderName = `gaussian_sequence_${ts}`;

      const savedPose = { ...renderCameraPose };
      const frames = [];

      try {
        for (let f = 0; f < totalFrames; f++) {
          const sample = samplePathAt(f / (totalFrames - 1));
          applySamplePoseToRig(sample);
          syncCameraHelper();
          const canvas = await renderGaussFullResCanvas();
          const blob = await canvasToPngBlob(canvas);
          const name = `frame_${String(f + 1).padStart(5, '0')}.png`;
          frames.push({ name, blob });
          if (f % 2 === 0 || f === totalFrames - 1) {
            status(`渲染路径序列 ${f + 1}/${totalFrames}…`);
          }
        }

        if (typeof window.showDirectoryPicker === 'function') {
          const dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
          const seqDir = await dirHandle.getDirectoryHandle(folderName, { create: true });
          for (const { name, blob } of frames) {
            const fileHandle = await seqDir.getFileHandle(name, { create: true });
            const writable = await fileHandle.createWritable();
            await writable.write(blob);
            await writable.close();
          }
          status(`已导出 ${totalFrames} 帧到文件夹 ${folderName}/`);
        } else {
          const { default: JSZip } = await import('https://cdn.jsdelivr.net/npm/jszip@3.10.1/+esm');
          const zip = new JSZip();
          const folder = zip.folder(folderName);
          for (const { name, blob } of frames) folder.file(name, blob);
          const zipBlob = await zip.generateAsync({ type: 'blob' });
          downloadBlob(zipBlob, `${folderName}.zip`);
          status(`已下载 ${folderName}.zip（${totalFrames} 帧 @ ${renderW}×${renderH}）`);
        }
      } finally {
        Object.assign(renderCameraPose, savedPose);
        syncRigFromPose();
        refreshPathVisuals();
        if (pathSlidePlaying && cameraMarkers.length >= 2 && !isPathSlideBlocked()) resumePathSlideIfPlaying();
      }
    }

    /**
     * 从 renderCamera 捕获高斯帧。必须暂停 selfDriven 循环并用库内 origRender，
     * 否则 rAF 里 OrbitControls.update() 会把 orbit 相机写回 RT/画布，预览几乎不随机位变化。
     */
    async function withRigGaussCapture(width, height, { renderTarget = null } = {}, drawFn) {
      syncRenderCameraParams();
      renderCamRig.updateMatrixWorld(true);
      renderCamera.updateMatrixWorld(true);

      const renderer = viewer.renderer;
      const orbitCam = viewer.camera;
      const savedCam = {
        position: orbitCam.position.clone(),
        quaternion: orbitCam.quaternion.clone(),
        up: orbitCam.up.clone(),
        fov: orbitCam.fov,
        near: orbitCam.near,
        far: orbitCam.far,
        aspect: orbitCam.aspect,
      };
      const savedTarget = renderer.getRenderTarget();
      const savedSize = renderer.getSize(new THREE.Vector2());
      const savedPixelRatio = renderer.getPixelRatio();
      const savedClear = renderer.getClearColor(new THREE.Color());
      const savedAlpha = renderer.getClearAlpha();
      const savedControlsEnabled = _n(viewer.controls && viewer.controls.enabled, true);
      const wasRunning = viewer.selfDrivenModeRunning;

      if (wasRunning) viewer.stop();
      if (viewer.controls) viewer.controls.enabled = false;

      const restoreRenderDims = overrideViewerRenderDimensions(width, height);
      const drawFrame = viewer._origGaussianRender || viewer.render.bind(viewer);

      try {
        applyRenderCameraToViewer(orbitCam, width / height);
        renderer.setPixelRatio(1);
        renderer.setRenderTarget(renderTarget);
        renderer.setSize(width, height, false);
        renderer.setClearColor(0x000000, 0);

        await viewer.runSplatSort(true, true);
        viewer.updateSplatMesh();
        drawFrame();
        return await drawFn({ renderer, width, height, renderTarget });
      } finally {
        restoreRenderDims();
        orbitCam.position.copy(savedCam.position);
        orbitCam.quaternion.copy(savedCam.quaternion);
        orbitCam.up.copy(savedCam.up);
        if (orbitCam.isPerspectiveCamera) {
          orbitCam.fov = savedCam.fov;
          orbitCam.near = savedCam.near;
          orbitCam.far = savedCam.far;
          orbitCam.aspect = savedCam.aspect;
          orbitCam.updateProjectionMatrix();
        }
        renderer.setRenderTarget(savedTarget);
        renderer.setPixelRatio(savedPixelRatio);
        renderer.setSize(savedSize.x, savedSize.y, false);
        renderer.setClearColor(savedClear, savedAlpha);
        if (viewer.controls) viewer.controls.enabled = savedControlsEnabled;
        viewer.updateSplatMesh();
        if (wasRunning) viewer.start();
        viewer.forceRenderNextFrame();
      }
    }
